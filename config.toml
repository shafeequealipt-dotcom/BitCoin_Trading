[mode4]
# Mode 4: ProfitSniper — institutional-grade profit protection (Phase 1-10)
# 5 mathematical models: Hurst, Momentum Decay, ATR Extension,
# Volume Divergence, Risk/Reward. Regime-aware scoring + ATR trailing.
enabled = true
check_interval_seconds = 5

# Ring Buffer (Phase 1)
buffer_max_size = 720                    # 60 minutes at 5s (720 entries)
buffer_min_ready = 100                   # Need 8+ minutes for valid models

# Trailing System (Phase 8)
base_atr_multiplier = 2.5               # Chandelier Exit base width in ATR units
trail_min_change_pct = 0.1              # Min SL change % to avoid Shadow flooding
regime_factor_trending = 1.3            # Wider trail — let trends run
regime_factor_ranging = 0.7             # Tighter trail — reversion likely
regime_factor_volatile = 1.0            # Standard trail — volatility in ATR
regime_factor_dead = 0.6               # Tightest trail — no momentum, protect gains

# Anti-Greed (Phase 9) — pullback backstop
anti_greed_enabled = true
anti_greed_pullback_40_min_peak = 2.0   # Min peak % for 40% pullback → tighten
anti_greed_pullback_60_min_peak = 3.0   # Min peak % for 60% pullback → partial
anti_greed_pullback_75_min_peak = 5.0   # Min peak % for 75% pullback → full close

# Action cooldowns (Phase 9)
# Phase 2 of dir-block-fix (2026-05-05): lowered 30 → 15 so M4 can
# react inside the same anti-greed pullback window. Pre-fix BSBUSDT
# 2026-05-05 18:04-18:05 had M4_GATED tighten attempts at pullback
# 30-60 % from peak, all blocked by the 30 s cooldown; the position
# then closed via SL hit at +0.66 % after peaking +1.92 %.
tighten_cooldown_seconds = 15
partial_close_cooldown_seconds = 120
partial_close_pct = 50                  # % of position to close on partial action

# Sniper partial-close disable (2026-05-26, operator decision). false =
# the sniper never partial-closes a position; any score/greed/stall-escape
# partial_close is downgraded to a winner-trail tighten (no reduce-only
# fill, no fee, no winner-clip). The winner trail, full_close, time-decay,
# sentinel, hard stop, native stop, and SL gateway are unaffected. Set to
# true to restore the legacy partial-close behaviour.
sniper_partial_close_enabled = false

# Phase 4 (Sniper-loop fix) — type-agnostic per-position cooldowns.
# The legacy partial_close_cooldown_seconds only blocked the NEXT
# partial when the IMMEDIATELY-prior action was also a partial; an
# alternating tighten ↔ partial pattern defeated it (INJUSDT 21:48
# bug, 4× partials in 60s). The new gate is type-agnostic.
min_seconds_between_actions = 60        # any M4 action of any type starts this cooldown
min_seconds_before_close = 180          # full_close from score branch (anti-greed bypasses)
# Phase 4 (Sniper-loop fix) — PROFIT GATE on partials. The legacy
# P9_CLOSE_GATE only gates full_close; a partial could fire on a red
# position. Default 0.0 = require break-even before any partial fires.
min_profit_for_partial_pct = 0.0

# Phase 9 Sniper Stall Escape (P1-8) + Phase 4A de-escalation (session-stability)
# Escalation fires when the sniper is stuck at "actionable=True but action=hold".
# Layer 4 Realignment Phase 1B (2026-05-06): recalibrated 20→120 (partial)
# and 40→180 (full) to match the operator's 10-30 minute hold strategy.
# Old values (20/40 ticks = 100/200 s) killed positions in the first
# 1:40-3:20 of life, well below the 10-min strategy minimum. New values
# (120/180 ticks = 10/15 min) let positions develop their normal pattern
# before the sniper begins evaluating, and preserve a 60-tick (5-min)
# grace gap between the partial-close emission and the forced full-close.
# Phase 0 baseline showed median sniper hold of 5.8 min (max 7.6 min),
# none reaching 10 min — under the new defaults the stall counter would
# not have reached the partial threshold for any of the 18 closes.
stall_escape_partial_after_ticks = 120   # ~600s at 5s cadence → first escape (10 min)
stall_escape_full_after_ticks = 180      # ~900s at 5s cadence → escalate to full (15 min)
# After any escape emission the stall method waits this long before emitting again.
# Stops the 20x PARTIAL_CLOSE_UNSUPPORTED warning spam observed 2026-04-24.
stall_escape_cooldown_seconds = 30
# After this many tighten_agg downgrades without PnL recovery of at least
# stall_recovery_threshold_pct from the worst-observed PnL, escalate to full_close.
stall_tighten_max_applications = 3
stall_recovery_threshold_pct = 0.15
# Definitive-fix Phase 10 (2026-04-28) — partial-emit lifetime cap per
# position. Forensic S6: a stalled position fired 5 partial_close
# actions in 5 minutes (cooldown elapsed → partial → cooldown → partial
# … salami-slicing). Once a position has spent its partial budget,
# the next stall escape is full_close instead of another partial.
# Reset on _on_position_opened so each position gets a fresh budget.
# Layer 4 Realignment Phase 1D (2026-05-06): raised 1 → 3 to give
# positions room to recover via multiple partial closes before forced
# full close. Combined with Phase 1B's 60-tick (5-min) grace gap
# between partial and full, three partials give roughly 15 minutes of
# recovery opportunity before the position is forcibly exited.
max_partials_per_position = 3

# Sniper-Latency-Size Fix Phase 1 (2026-05-07) — enforced grace gap between
# stall-escape emissions on the same position. Phase 1D (commit 04a8170)
# claimed Phase 1B's 60-tick gap was implicitly enforced, but Phase 1B
# only set absolute thresholds (120 partial, 180 full). The ladder
# observed 2026-05-07 10:57:40-10:59:19 fired 4 escalations on RENDERUSDT
# in 99 seconds (gaps 5/6/5 ticks) because only the 30-second blanket
# cooldown gated re-emission. The keys below add an explicit minimum
# inter-escape spacing keyed on tick count so a position partial-closed
# at tick=121 cannot be partial-closed again or full-closed (from the
# cap path) until tick>=181 — five minutes of recovery time.
# The forced-full path (`ticks > stall_escape_full_after_ticks`) is the
# mature-stall valve and bypasses the grace gap by design.
partial_to_full_grace_ticks = 60          # Min ticks between partial emission and full close
partial_to_partial_grace_ticks = 60       # Min ticks between consecutive partials

# Logging / DB write throttle (Phase 10)
log_every_n_ticks = 6                   # M4_EVAL log every 30s (6 × 5s)
log_always_above_score = 50             # Always log if composite score >= this
sniper_log_write_every_n_ticks = 6      # Write to DB every 30s minimum

# Legacy classification thresholds — used by _classify_score() for M7 labels
score_watch = 30
score_consult_claude = 50
score_auto_partial = 70
score_auto_full = 85

# Legacy profit/immunity filters — used by _classify_score()
min_profit_pct = 0.8
min_profit_for_action = 0.10             # Min PnL% before Mode4 Phase 9 takes action
profit_immunity_seconds = 60
loss_immunity_seconds = 30
full_rules_after_seconds = 300

# Legacy cooldowns — used by is_in_cooldown() / _is_safe_to_execute()
cooldown_extreme_seconds = 300
cooldown_strong_seconds = 180
cooldown_medium_seconds = 120

# Legacy Claude settings — kept for _consult_claude() method
claude_timeout_seconds = 15
max_claude_queries_per_hour = 10
claude_hold_recheck_seconds = 30

# Legacy model weights (must total 100) — used for M7 counterfactual snapshot
weight_zscore = 25
weight_velocity = 25
weight_volume = 20
weight_bollinger = 15
weight_momentum = 15

# Legacy flash crash protection
flash_crash_auto_score = 70

# TRADE LIBERATION: Trail distance floors + activation threshold
min_trail_atr_multiplier = 1.5              # Min trail = 1.5 × ATR (noise floor)
min_trail_pct = 0.30                        # Min trail as % of entry price
# Phase 2 of dir-block-fix (2026-05-05): raised 0.30 → 0.50 so the
# trail does not begin tightening until the position is meaningfully
# in profit. Combined with max_step_pct=0.25 and tighten_cooldown=15,
# this lets winners breathe instead of locking in scraps.
# DEPRECATED (PF/LC Top-15 Problem 2.4) — superseded by
# [profit_fetching] min_profit_for_trail_pct (aligned to the ladder arm at 0.2).
# Left in place for back-compat; the sniper no longer reads this key.
min_profit_for_trail_pct = 0.50             # Min peak PnL% before trail activates
min_profit_decay = 0.50                     # Floor for profit_decay factor

# T1-3 (2026-05-12) — Trail floor from CURRENT price (mean-reversion guard).
# The min_trail_pct/atr_multiplier above bound only the from-PEAK distance.
# As price oscillates BELOW peak, sl_dist_to_cur can shrink to noise levels
# (~0.15 %) and trigger SL on bid-ask jitter. Empirical bug fired on
# ARBUSDT/SKRUSDT 2026-05-12 with sl_dist=0.15 % vs 0.13 % noise band.
# Formula in profit_sniper._apply_trail_stop:
#   floor_pct = clamp(max(min_pct, atr_5m_pct * atr_mult), upper=max_pct)
# Behaviour: CLAMP outward to floor_pct away from current_price; preserve
# trail intent. Reject only when the clamp would loosen prior cur_sl
# (logged as action=reject_would_loosen).
# Defaults sit ~2x above the gateway R2 effective floor on dead coins so
# trail-layer protection is real. Tunable downward only after a session of
# SNIPER_TRAIL_FLOOR_CLAMP observability proves the formula is too strict.
trail_floor_from_price_atr_multiplier = 0.75   # 5m NATR multiplier
trail_floor_from_price_min_pct = 0.20          # absolute floor (%)
trail_floor_from_price_max_pct = 1.50          # safety cap (%)

# =============================================================================
# Layer 4 Realignment (2026-05-06) — Profit Sniper protection knobs
# =============================================================================
# Knobs added by the Layer 4 Comprehensive Realignment fix to align the
# Profit Sniper with the operator's aggressive-exploitation philosophy.
# These do NOT replace [mode4] — they ADD a thin protection layer in
# front of the existing stall-escape decision so fresh trades,
# profitable trades, and developing trades are not killed before they
# have a chance to resolve. The whole [mode4] stall escalation logic
# remains intact and runs as before; this section just gates ENTRY into
# that logic on age/PnL boundaries that mirror the other Layer 4 paths.
#
# Phase 1A — minimum-age guardrail. Mirrors
# `watchdog.strategic_action_min_hold_seconds` (300 s) and
# `time_decay.min_age_seconds` (300 s). Below this age, the sniper's
# stall counter does not advance — fresh positions cannot be
# force-closed by the sniper.
#
# Phase 1C (added in a later sub-phase commit) — PnL-aware stall escape.
# `profit_protection_threshold` blocks the stall counter on profitable
# positions; `development_window_lower` blocks it on positions still
# inside the normal small-loss development window. Together these stop
# the give-back pattern (winning trades killed because the stall counter
# expired) and the kill-too-early pattern (positions at -0.1 % that
# would have resolved given more time).
[layer4.sniper]
min_age_seconds = 300                       # Phase 1A — block stall escape on positions younger than 5 min
profit_protection_threshold = 0.0           # Phase 1C — block stall escape when pnl > this (winners protected)
development_window_lower = -0.3             # Phase 1C — block stall escape when pnl > this (still developing)

# Issue C fix Phase 3b (2026-05-08) — peak-protected stall extension.
# Positions whose ``state.peak_pnl_pct`` ever crossed
# ``peak_protection_threshold_pct`` get the extended
# ``peak_protected_full_after_ticks`` (default 80, ~6.7 min at 5 s
# cadence) before the mature-stall valve fires, instead of the base
# ``Mode4Settings.stall_escape_full_after_ticks`` (default 40,
# ~3.3 min). The 13:00–16:00 UTC 2026-05-08 audit showed 4 valve
# closures of which 2 (INJUSDT peak +0.30 %, ARBUSDT peak +0.13 %)
# had clearly demonstrated edge before reverting and would have been
# spared. SANDUSDT (peak +0.06 %) and HYPERUSDT (peak 0 %) remain
# below the default threshold and continue to be killed at the base
# 40-tick threshold — runaway-loss protection preserved.
# Set ``peak_protection_threshold_pct = 0`` to disable (kill-switch).
peak_protection_threshold_pct = 0.10        # min peak PnL % to qualify for extension
peak_protected_full_after_ticks = 80        # extended tick threshold when peak qualifies

# Issue C fix Phase 3c (2026-05-08) — recovering-PnL gate. Even when
# ticks would otherwise force the mature-stall valve, a position
# rebounding by at least ``recovering_threshold_pct`` from its worst
# observed PnL is given another tick. Distinct from the existing
# ``stall_recovery_threshold_pct = 0.15 %`` (under [mode4]) which
# only escapes the tighten-cap branch; this new gate protects the
# tick-count path too. Set ``recovering_threshold_pct = 0`` to
# disable.
recovering_threshold_pct = 0.10             # min PnL recovery delta from worst to spare valve

# =============================================================================
# Profit-Fetching Exit System (2026-05-29)
# Time-driven whole-position exit engine integrated into the ProfitSniper.
# See PROFIT_FETCHING_SYSTEM_MASTER_BLUEPRINT.md. EVERY value below is a
# STARTING POINT for tuning, not a final number — honest tuning waits for
# truthful after-cost PnL. The time dial (src/core/time_dial.py) slides each
# *_young anchor toward its *_old anchor as a trade ages from 0 to its
# per-trade deadline (the brain's max_hold_minutes).
# =============================================================================
[profit_fetching]
# Master switch. true = the engine is active on the next restart (operator
# Phase 1 gate, 2026-05-29). false = legacy trail/deadline/profit-take only.
enabled = true

# Techniques 2+4 — ATR / Chandelier trail distance multiple (in ATR units).
# Wide young (let the move breathe), tight old (protect the gains).
atr_multiple_young = 3.0
atr_multiple_old = 1.0
# PF/LC Top-15 Problems 3.2 + 3.5 — feed the per-tick Chandelier trail the real
# M5 Wilder ATR (the warm-seeded _get_current_atr the loss path already uses)
# instead of the cold ring-buffer proxy, preserving the live -> entry-ATR ->
# floor fallback for cold-start. When on, the SNIPER_ATR_FALLBACK log is rare
# and demoted to DEBUG. Default false → prior source and INFO log unchanged.
# Direction-reconcile fix (2026-06-04, Problem 3 / F12,F27) — turned ON. With it
# OFF the trail used the cold ring-buffer atr_current (0 for a freshly-opened
# low-data coin like MON), so the volatility-adaptive Chandelier was pinned to
# the STATIC entry ATR and its stop updates no-op'd. ON routes the trail to the
# warm-seeded, live-recomputing _get_current_atr so it adapts to live volatility.
trail_live_m5_atr_enabled = true

# Technique 1 — stepped break-even ladder.
# Step spacing: profit climb needed to trigger the next lock (percent).
# Wider young, tighter old (grab profit in smaller increments late).
ladder_step_pct_young = 0.6
ladder_step_pct_old = 0.4
# Lock offset behind each crossed level (percent). Looser young, tighter old.
# At step 0.5 / offset 0.3 a +0.5% crossing locks +0.2% (blueprint example).
lock_offset_pct_young = 0.3
lock_offset_pct_old = 0.2
# First ladder level — profit must reach this percent before the ladder arms.
# Item 2.1 / O1 (2026-06-03) — lowered 0.5 -> 0.2 so the zero-crossing breakeven
# floor (ladder_breakeven_lock_pct, below) actually ENGAGES on the modest-peak
# faders. The live study found 108 of 162 round-trip losers peaked in the gap
# [0.05%, 0.5%): they went green but never reached the 0.5% arm, so the floor was
# structurally unreachable and they round-tripped into a loss. Guardrail (fresh
# data): ZERO winners peaked below 0.2% (winner peak p10 0.447%), so lowering to
# 0.2 cannot strangle a slow-starter. Deliberately NOT lowered to 0.1 in one step.
# This also graduates loss->profit authority 0.3% earlier (the same threshold
# drives the GRADUATION_LATCH). PROVISIONAL pending truthful PnL. OFF-SWITCH: set
# ladder_breakeven_lock_pct <= 0 to disable the floor entirely (arming at 0.2 then
# locks nothing until a real rung, i.e. the pre-fix behaviour), or restore 0.5
# here to revert the arm change alone.
min_profit_to_arm_ladder_pct = 0.4
# PF/LC Top-15 Problem 2.4 — the Chandelier trail's activation threshold,
# aligned to the ladder arm (0.2%) so the ladder and the trail coexist across
# the full graduated band instead of the trail sitting idle in the 0.2-0.5%
# band. Supersedes [mode4] min_profit_for_trail_pct (0.5), now deprecated.
min_profit_for_trail_pct = 0.4
# Finding 6 (2026-06-02) — zero-crossing breakeven floor. The arm threshold
# (0.5%) sits below the first step rung (step_young 0.6%), so a modest peak in
# [arm, first_step) used to arm the ladder but lock nothing, and a +0.59% peak
# rode back to a small loss. Once the high-water profit reaches the arm
# threshold this guarantees at least this much locked profit (a breakeven-plus-
# sliver floor) while price is still up, so the stop ratchets to at least
# breakeven; the normal step lock takes over once a real rung is crossed. The
# min-distance rule is not loosened — breakeven is reached by locking earlier.
# PROVISIONAL pending truthful PnL. A value <= 0 is the clean off-switch (the
# modest in-the-gap peak locks nothing, the old behaviour).
ladder_breakeven_lock_pct = 0.05
# Fix 3 (2026-06-05) — dead-band give-back trail. A peak in [arm 0.2%, first
# step 0.6%) locked only the breakeven sliver above and gave back the whole
# modest peak (IMXUSDT +$21 booked -$5). > 0 trails a floor this far below the
# high-water peak inside that band: lock = max(be_lock, peak - giveback). 0.10
# = a +0.22% peak banks +0.12%. Tighten-only. <= 0 = old breakeven-only. PROVISIONAL.
ladder_deadband_giveback_pct = 0.10
# Finding A (2026-06-08) — fee-aware breakeven/first-lock. A gross-positive
# "breakeven" lock that does not clear the round-trip taker fee (~0.11% of
# notional) still books a small NET loss after fees (the dominant small-loss
# mechanism: NEAR locked +0.035% -> net -$4.57). When a sub-fee floor would lock
# AND the trade's peak has cleared this hurdle, the floor is raised to this
# fee-clearing level so a "breakeven" lock is net-breakeven. Must be >= the
# round-trip taker fee (0.055% x 2 = 0.11%); 0.13 = fee + a small margin. Never
# lifts the lock above the reached peak; step locks (>= ~0.3%) already clear it.
# 0 = off (restore gross locks). PROVISIONAL — a tuning starting point.
ladder_lock_fee_clearance_pct = 0.13
# Issue 1 (CALL_A exploit/fetch, 2026-06-05) — decoupled micro-floor arm. The
# floor armed at min_profit_to_arm_ladder_pct (0.2%), but that SAME 0.2% also
# triggers the one-way GRADUATION_LATCH (loss-cutting hands authority to the
# profit system), so it could not be lowered naively without stripping
# spike/cap/stall protection on a trade that only briefly poked green. Most
# losers peak under +0.2% (median ~+0.07%) and round-trip because the floor
# never arms. This separate, lower arm engages ONLY the breakeven/dead-band
# floor (captures the small green where the gateway min-distance allows,
# at-least-breakeven elsewhere) while GRADUATION_LATCH still reads 0.2%, so
# loss-cutting authority is retained until genuine +0.2%. Bounded to never
# exceed the graduation arm. Set equal to min_profit_to_arm_ladder_pct to
# restore the old single-arm behaviour. Tuning starting point.
micro_floor_arm_pct = 0.10

# F2 (fee-scratch churn, 2026-06-09) — fee-aware micro-floor arm. The micro arm
# above (0.10%) and the breakeven lock (ladder_breakeven_lock_pct, 0.05%) both sit
# BELOW the round-trip taker fee (~0.11%); the fee-aware LIFT
# (ladder_lock_fee_clearance_pct, 0.13%) only fires when peak > 0.13%. So a trade
# peaking in [micro_floor_arm_pct, ladder_lock_fee_clearance_pct) arms a breakeven
# stop that is never lifted, locks sub-fee, and books a guaranteed NET FEE LOSS
# when a tiny pullback taps it — the proven sub-2-minute fee-scratch mechanism. When
# true, the effective arm becomes max(micro_floor_arm_pct, ladder_lock_fee_clearance_pct),
# still clamped to the graduation arm, so the floor does not arm (and pull the stop
# to a sub-fee breakeven) until the peak has cleared the SAME fee hurdle the lift
# uses; below that the trade keeps its original wider stop and breathes, with
# loss-cutting authority retained. Reuses the existing fee value (no inline fee),
# consistent with the Finding-A exit lift. DEFAULT OFF (behaviour-preserving): F2
# must be measured against truthful PnL, available only after the pending F5/F1
# restart. Also off via ladder_lock_fee_clearance_pct <= 0. Observable via the
# MICRO_FLOOR_FEE_SUPPRESS event. Set true only after the post-restart measurement.
micro_floor_arm_fee_aware_enabled = true

# Item 2.2 / O6 / F12 (2026-06-03) — jump the breakeven floor on the arming tick.
# The ladder already bypasses the gateway max-step (R3), but the sniper still
# skips a write inside the 30s gateway rate-limit (R4) window, so the FIRST
# breakeven lock can lag up to 30s and a modest peak that fades inside that
# catch-up window round-trips despite arming the ladder (Finding 12, e.g. DYDX
# captured only ~46% vs 75-89% on clean runners). When true, the single arming
# tick (the not-armed -> armed transition of the zero-crossing floor) also
# bypasses the rate-limit so the floor lands immediately in one move, as tight as
# the gateway min-distance allows. R1 tighten-only and R2 min-distance still
# apply (it can never loosen or sit on noise); the bypass is one-shot per
# position. Also gated by ladder_breakeven_lock_pct > 0. Set false to keep the
# floor but revert to the rate-limited first lock. PROVISIONAL pending truthful
# PnL. Observable via the LADDER_FLOOR_JUMP sentinel.
ladder_floor_jump_on_arm = true

# F6 (2026-06-09) — first step-rung lock jump. ladder_floor_jump_on_arm above
# covers ONLY the zero-crossing breakeven floor. On a FAST young pop the price
# clears the first real step rung before the breakeven floor ever gets its turn,
# so the FIRST step-rung lock (a real guaranteed-profit lock) is the one delayed
# up to the 30s rate-limit window — the choppy-capture collapse. When true, that
# first step-rung lock also bypasses the rate-limit and lands in one move,
# one-shot per position (subsequent ratchets use the normal cadence). It is
# distinct from and mutually exclusive with the breakeven-floor jump. R1
# tighten-only and R2 min-distance still apply (it can never loosen or sit on
# noise); it only removes the rate-limit wait on the first real lock. DEFAULT OFF
# — ships inert. Set true only after live observation. Observable via the
# LADDER_FIRST_LOCK_JUMP sentinel.
ladder_first_lock_jump_enabled = true

# Technique 3 — time-decay dial shape. Transition centres near this age
# (data: ~22-min peak). Documentation only for now (simple linear glide).
peak_minutes = 22.0

# Fallback deadline (minutes) for the time dial when a position has no
# registered TradePlan (e.g. externally-opened). Analyzed working max hold ~50.
default_deadline_minutes = 50.0
# PF/LC Top-15 Problem 2.5 — freeze the time dial on the ORIGINAL deadline when
# the watchdog extends a near-flat loser, so the extension grants grace on the
# close-timer without re-loosening the protective dial (the dialed
# stall_min_age_fraction / cap / structure buffer slide back toward their young
# anchors as the age fraction drops, and those non-stop force-close paths are
# not protected by R1). Default false: the audit measured the net effect as a
# near-wash, so this is the operator's call. True freezes the dial denominator.
dial_freeze_on_original_deadline_enabled = false

# Safety stop — loss cap for non-climbers and the naked-position sweeper
# (percent). Constant (not dialed). Sits inside the -3% watchdog hard stop.
safety_stop_pct = 2.5

# ATR-zero hardening fallback (consumed in Phase 2). When live ATR reads zero
# AND entry-ATR is unavailable, the trail uses this percent-of-price distance
# so a position can never end up with no trailing protection.
atr_zero_fallback_pct = 0.5

# Phase 5 — Full reconciliation of the watchdog winner-cutters. Each is
# independently revertible (flip false to restore that legacy watchdog path)
# and additionally gated by `enabled`.
# Ride a still-profitable trade past its deadline on the sniper's tight trail
# instead of the SENTINEL hard-close.
ride_winner_past_deadline = true
# Skip the watchdog +1.5%-past-half-time profit-take close.
subordinate_profit_take = true
# Fully disable the watchdog percentage trail (activation/SL-push/exit) so the
# sniper spine is the sole trailing-SL writer.
subordinate_watchdog_trail_exit = true

# Phase 6 — safety stop / naked-position sweeper. A naked position is always
# given a safety stop (safety_stop_pct off entry) when enabled. When
# safety_floor_reassert is true the floor is also re-asserted (tighten-only) on
# any position whose existing stop is looser than the floor; set false to only
# fill fully-naked positions and never override a brain-set wider stop.
safety_floor_reassert = true

# =============================================================================
# Loss-Cutting System (2026-05-31)
# The protective half of the position-management engine (companion to
# [profit_fetching]). Integrated into the SAME ProfitSniper spine + SLGateway.
# See LOSS_CUTTING_SYSTEM_MASTER_BLUEPRINT.md. EVERY value below is a STARTING
# POINT for tuning, not a final number — honest loss-reduction tuning waits for
# truthful after-cost PnL. The loss time dial (src/core/time_dial.py
# resolve_loss) slides each *_young anchor toward its *_old anchor as a trade
# ages from 0 to its per-trade deadline; the volatility (ATR) dial is applied in
# the sniper by multiplying the dialed multiple by the effective ATR.
# Authority split: PnL>=0 -> profit-fetching manages; PnL<0 -> this system.
# =============================================================================

# =============================================================================
# DYNAMIC ADAPTIVE EXIT SYSTEM (2026-06-15)
# Converts the fixed exit thresholds into bounded multiples of R (the coin's
# ATR-as-percent, the movement unit); every PROFIT threshold floors at the
# round-trip fee so a locked win is net-positive. The pure geometry lives in
# src/analysis/vol_scale.py and reads these coefficients (nothing hardcoded
# inline). The owner hierarchy is unchanged; this only sets the VALUES it
# writes. Tuned on the replay (simulate_adaptive_exit_replay.py); re-tunable
# here without code. Lands DORMANT (enabled=false): geometry + config load but
# no consumer reads them until verification flips this on, one commit at a time.
# See ADAPTIVE_EXIT_PHASE3_DESIGN.md.
# =============================================================================
[adaptive_exit]
enabled = true

# The fee floor — the spine. Every profit threshold floors at this.
round_trip_fee_pct = 0.11          # canonical round-trip taker fee for exit geometry
fee_floor_buffer = 1.0             # fee floor = round_trip_fee_pct * buffer

# R smoothing — EMA on the per-position movement unit (alpha in (0,1]; 1.0 = off).
# The profiler's 60-120s cache already makes R step-wise stable; this smooths the
# step transitions. Applied at the fetch boundary, never inside the geometry.
r_smoothing_alpha = 0.3

# The arm: max(arm_r * R, fee_floor), bounded.
arm_r = 0.5
arm_min_pct = 0.0
arm_max_pct = 1.0

# The ladder rungs (in R) and staged capture.
rung_r = [1.5, 3.0, 5.0]
secure_at_3r_r = 1.5               # secured profit (in R) once the middle rung is crossed
lock_max_pct = 0.0                 # 0 = naturally bounded by the peak

# The trail fraction of R behind the peak (consumed by profit_lock_pct). 0.5R
# tuned on the replay (realized peaks are ~1R, so a tight trail captures more).
trail_r = 0.5

# Profit-scaled trail tightening (2026-06-26 give-back fix). The trail coefficient
# starts at trail_r for young/small movers and decays toward trail_r_floor as the
# running peak grows in R units, so a larger green trade locks progressively nearer
# its peak (protection tightens as profit grows). See vol_scale.effective_trail_r.
#   eff = trail_r_floor + (trail_r - trail_r_floor) / (1 + max(0, peak/R - knee)/scale)
# SHIPPED INERT: trail_r_floor = trail_r = 0.5 makes the term a constant trail_r,
# byte-identical to the pre-fix half-R trail. Activation is a single flip of
# trail_r_floor below trail_r (replay-selected) AFTER the operator gate.
trail_r_floor = 0.30               # ACTIVE (mild, operator-activated 2026-06-26): trail tightens toward 0.30R as the peak grows past the knee
trail_tighten_knee_r = 1.0         # no tightening until the peak clears this many R (over-tighten guard)
trail_tighten_scale_r = 1.0        # R above the knee over which the coefficient decays toward the floor

# The hard stop: a wide R-multiple backstop below the sacred cap (the cap is
# enforced separately and always fires first).
# The hard stop is a wider BACKSTOP than the sacred cap: floored at/above the
# young cap (2.5%) so it never preempts the cap (which fires first), capped at a
# sane outer bound. Replaces the flat -3% (too loose for quiet coins, too tight
# for volatile ones). 9R: R=0.3% -> 2.7%, R=0.6% -> 5.4%, R>=1.1% -> 10% cap.
hard_stop_r = 9.0
hard_stop_min_pct = 2.5            # >= the young cap so the cap stays operative
hard_stop_max_pct = 10.0          # outer sanity bound for high-vol coins

# The dead-drifter scratch (conservative: release only late, no-1R, veto silent).
dead_drifter_enabled = true
dead_drifter_age_fraction = 0.70
dead_drifter_min_move_r = 1.0

# =============================================================================
# Authority split (loss-cutting): PnL<0 -> this system.
# =============================================================================
[loss_cutting]
# Master switch. true = the engine is active on the next restart (operator
# default ON, mirroring profit-fetching). false = legacy watchdog backstops only.
enabled = true

# Per-technique enable flags (each independently revertible without code).
enable_atr_initial_stop = true
enable_hard_cap = true
enable_stall_exit = true
enable_structure_stop = true
enable_winprob_observe = true
enable_spike_stop = true
enable_history_recovery = true
# Issue 2.5 (2026-06-07): re-arm the loss-cutting block ONCE when a graduated
# trade craters into a real loss (current pnl <= -graduation_crater_loss_pct),
# restoring the tightening cap the one-way graduation latch otherwise removes.
# A climbing winner never craters, so none is cut; one-shot prevents whipsaw.
# Default OFF pending live observation — set true to enable.
graduation_crater_rearm_enabled = false
graduation_crater_loss_pct = 0.5
# Phase 3 — volatility-based entry sizing. NOT IMPLEMENTED. Operator decision
# 2026-05-31: keep the brain-authoritative sizing intact and bound loss via the
# percent-of-notional cap below instead of shrinking positions. This flag is
# reserved (no code reads it); leave false. Re-opening it would compose a
# vol-sized ceiling on top of brain sizing — see the plan's Phase 3 note.
volatility_entry_sizing_enabled = false

# The sacred hard cap = min(dollar_ceiling, pct_of_notional). Operator decision
# 2026-05-31: the PERCENT-of-notional is the normal binding constraint (a sane,
# non-strangling stop that scales with position size and keeps the brain's
# sizing intact), and the dollar ceiling only bounds the CATASTROPHIC worst case
# on a very large position. The percent tightens inward with age; the ceiling is
# fixed and never loosens. With ceiling $75 + percent 2.5%->1%: a $1000 position
# caps at $25 (2.5%) young / $10 (1%) old; a $3000 position at $75 (2.5%) /
# $30 (1%); only a >$3000 position is bounded by the $75 ceiling. (A literal $5
# ceiling was rejected — on a $1000-3000 position it is a 0.17-0.5% stop that
# strangles, and would have required shrinking positions, undoing brain sizing.)
cap_dollar_ceiling = 75.0
cap_pct_of_notional_young = 2.5
cap_pct_of_notional_old = 1.0
# Finding N (2026-06-08) — net-aware cap. The cap distance bounds the GROSS price
# loss; the round-trip taker fee pushes the realized NET past the ceiling (NEAR
# gross -74.69 ~= $75 cap, but net -81.24, ~8% over). Subtract this round-trip
# fee percent from the gross cap budget (applied to the force-close threshold AND
# the placed cap SL) so the realized net lands at or under the ceiling. TIGHTENS
# gross so net is bounded; never loosens. Must equal the round-trip taker fee
# (0.055% x 2 = 0.11%); 0 = off (gross cap). PROVISIONAL.
cap_round_trip_fee_pct = 0.11
# When the cap distance falls inside the gateway min-distance (un-placeable as an
# SL on high/extreme coins), enforce the cap by a coordinator force-close when
# realized PnL reaches the cap distance, never a clamped wrong-distance SL.
force_close_when_cap_unplaceable = true

# Finding 5 (2026-06-02) — cap slippage buffer. The exchange stop is a market-
# trigger stop that fills PAST its trigger on a fast move, so a stop placed
# exactly at the cap distance can realize a loss just over the ceiling (one
# breach in 314 trades). This pulls the cap-DERIVED stop trigger this percent of
# the cap distance INSIDE the ceiling so expected slippage still lands within it.
# Applies ONLY to stop PLACEMENT; the sacred force-close still fires at the true
# ceiling, and the CAP_SLIPPAGE_OBSERVED sentinel logs any overshoot trend.
# PROVISIONAL pending truthful PnL — 0.5 is a conservative starting point; a
# fast-gap fill can still overshoot. 0 disables the buffer.
cap_slippage_buffer_pct = 0.5

# Technique 1 — ATR-based initial stop (placed the second a trade opens). Wide
# young (breathe), tight old. Loss-owned mirror of the profit ATR multiple.
atr_initial_multiple_young = 3.0
atr_initial_multiple_old = 1.0

# Technique 2 — time-based stall-exit with the signs-of-life veto. The stall
# only fires past this fraction of the deadline. Young > 1 = a young trade is
# NEVER stall-cut; old ~0.55 fires past ~55% of the deadline.
stall_min_age_fraction_young = 1.1
stall_min_age_fraction_old = 0.55
# Signs of life that VETO the cut (spare a slightly-building late-bloomer):
# a recent peak_pnl_pct rise of at least this %, OR a ticks-in-profit ratio at
# least this high, OR pnl improving tick-over-tick.
#
# Finding 2 (2026-06-02) — THE VETO-AND-RECOVERY INTERACTION LEVER. This veto
# proved generous live (it spared far more cuts than it made): some flat-faders
# rode to a deadline close at a moderate loss (ENA -41) while the SAME lenient
# path let the recovery trail catch others small (ATOM -6). The lever is the
# INTERACTION of this leniency with the loss-side recovery trail
# (recovery_bounce_trail_atr_loss_side, below). profit_ratio is nudged
# 0.20 -> 0.25 and the loss-side recovery trail 0.5 -> 0.40, both in the same
# tightening direction. The three-condition OR is kept intact (late-bloomer
# protection is sacred). PROVISIONAL pending truthful PnL — watch
# LOSS_STALL_VETO (veto_count), LOSS_STALL_VETO_BUDGET, and LOSS_RECOVERY.
stall_signs_of_life_peak_improve_pct = 0.15
stall_signs_of_life_profit_ratio = 0.25
stall_signs_of_life_lookback_ticks = 24
# PF/LC Top-15 Problem 2.1 — use a WINDOWED recent in-profit ratio (over the
# last stall_signs_of_life_lookback_ticks ticks) for the stall "building" veto
# instead of the cumulative lifetime ratio, so stale early-profit evidence no
# longer keeps a dying trade alive. Same 0.25 threshold. Default false: it can
# cut a late-bloomer, so offline-validate against history before enabling.
stall_veto_windowed_profit_ratio_enabled = false
# PF/LC Top-15 Problem 2.2 — require SUSTAINED improvement (current PnL at least
# stall_signs_of_life_improving_floor_bps above the lowest of the last
# stall_signs_of_life_improving_lookback_ticks ticks) before the "improving"
# reprieve spares a stalling trade, instead of firing on a single noise up-tick.
# Default false: tightening the reprieve cuts more trades, so offline-validate
# the late-bloomer pool before enabling.
stall_signs_of_life_sustained_improving_enabled = false
stall_signs_of_life_improving_lookback_ticks = 3
stall_signs_of_life_improving_floor_bps = 2.0
# Finding 2 — observability only: emit a one-shot LOSS_STALL_VETO_BUDGET when a
# single position has been spared this many times (~one per minute) so a
# notably-lenient sparing is visible live. Does NOT force a cut. 0 disables.
stall_veto_budget_warn = 8
# Past this fraction of the deadline the stall-exit yields to the watchdog's
# 95%-time loser timeout (so the two never race for the very-late cut).
stall_tail_yield_fraction = 0.95

# Technique 3 — structure-based stop just beyond the X-RAY invalidation level.
# Buffer beyond invalidation, in ATR units; shrinks with age.
structure_buffer_atr_young = 0.50
structure_buffer_atr_old = 0.10

# Technique 4 — win-probability exit (COORDINATED, not duplicated). The actual
# p_win force-close stays in the watchdog time-decay path (the single owner; it
# logs its own cut). This is its tuning home: when loss-cutting is enabled the
# watchdog sources near_certain_loser_p_win from winprob_cut_threshold_young
# (0.10 by default = the existing value, a no-op until tuned) and logs
# LOSS_WINPROB_COORD at boot. Only _young is wired today (single static
# threshold); _old is reserved for a future age-rising variant. The sniper adds
# NO second cutter. Widening is a truthful-PnL tuning decision.
winprob_cut_threshold_young = 0.10
winprob_cut_threshold_old = 0.20

# Technique 5 — volatility-spike-down catastrophe stop (time-INDEPENDENT; a
# crash is dangerous at any age). On a violent adverse move over the window
# (>= this many ATR units) the spike force-CLOSES the position (the fastest
# catastrophe exit); it does not place an SL.
spike_atr_move_mult = 2.5
spike_window_seconds = 30.0
# PF/LC Top-15 Problem 3.4 — opening-seconds carve-out. The spike is now
# always-on (Problem 1.2), so a very young low-vol trade could read a modest
# settling wiggle as a crash. For the first spike_young_opening_seconds the
# spike needs the wider spike_atr_move_mult_opening; after that it uses the
# normal spike_atr_move_mult. 3.8 ATR is still a genuine crash, so protection
# stays intact.
spike_young_opening_seconds = 12.0
spike_atr_move_mult_opening = 3.8

# Final-phase history-aware recovery (tight bounce-capture). The final phase
# begins past this fraction of the deadline. A mostly-profit-side trade
# (ticks-in-profit ratio at/above recovery_profit_side_ratio) gets a wider bounce
# trail; a mostly-loss-side trade gets a tight trail that captures near least-loss.
recovery_final_fraction = 0.80
recovery_profit_side_ratio = 0.50
recovery_bounce_trail_atr_profit_side = 1.5
# Finding 2 (2026-06-02) — loss-side half of the veto-and-recovery lever. Nudged
# 0.5 -> 0.40 so a vetoed bleeder reaching the recovery window is caught tighter
# (more ATOM-like small catches). PROVISIONAL pending truthful PnL.
recovery_bounce_trail_atr_loss_side = 0.40

# =============================================================================
# TIAS Phase 2 — DeepSeek Post-Trade Analysis via OpenRouter
# =============================================================================
[tias]
enabled = true
# Switched to OpenRouter free-tier models (2026-07-06, operator request) — no
# per-call cost, but account-wide free-tier cap is 50 req/day (1000/day once
# $10+ credits are purchased on OpenRouter), shared with [apex] below.
primary_model = "openai/gpt-oss-120b:free"
fallback_model = "meta-llama/llama-3.3-70b-instruct:free"
temperature = 0.3
max_tokens = 1500
timeout_seconds = 45
max_retries = 1
analysis_version = 1

# =============================================================================
# APEX — Aggressive Profit Extraction & Exploitation (via OpenRouter)
# =============================================================================
[apex]
enabled = true
# F9 (2026-06-09) — loss-only re-entry cooldown + selection exclusion. When true,
# a coin that takes a real loss enters a reentry_cooldown_seconds cooldown during
# which it is held OUT of the Call-A candidate list (a fresh coin takes the slot)
# and re-entry is blocked at the gate; it reappears exactly when the cooldown
# expires. Wins/scratches get no cooldown. Ships OFF; enable after offline
# validation against the DOGE re-churn.
loss_cooldown_enabled = true
# Fix 8 (re-churn cooldown calibration, 2026-06-10) — sized on the losing-window
# replay. The apex loss-only re-entry cooldown defaulted to 300s, but RUNE's 11
# consecutive same-direction loss re-entries were 604-1511s apart, so a 300s
# cooldown blocked ~0 of them — toothless against the prolonged-downtrend
# re-churn. A flat 1200s blocks 10 of RUNE's 11 in-window re-entries (every gap
# under 1200s) while the operator keeps the FLAT design (no escalation curve).
# Loss-only: a win sets no cooldown, so a profitable coin is never held out. A
# losing coin is excluded from the Call-A candidate list for 1200s; its slot goes
# to a fresh candidate (trading redistributes, it does not reduce).
reentry_cooldown_seconds = 1200
# Switched to OpenRouter free-tier models (2026-07-06, operator request) — see
# [tias] above for the shared account-wide free-tier rate-limit note.
model = "openai/gpt-oss-120b:free"
fallback_model = "meta-llama/llama-3.3-70b-instruct:free"
# Layer 3: was 30s; DeepSeek frequently responds at 30-32s causing APEX_TIMEOUT.
timeout_seconds = 60
max_tokens = 800
temperature = 0.2
# Brain-Authoritative Sizing (2026-05-31): the brain does intelligent fund
# management against ONE source of truth — tiered_capital. It is shown open-trade
# count + used/usable/available MARGIN + per-trade margin budget + coin prices, and
# sizes each trade so its MARGIN (size_usd / leverage) is about usable/max_positions
# so the whole book of max_positions fits usable capital, built over the ~5-min
# cycles. Under the flag the gate's CHECK 4 enforces exactly that per-trade MARGIN
# ceiling (leverage-aware: notional = margin x leverage), and CHECK 1 / the venue
# cap become EQUITY-TRACKING absolute backstops = usable x max_leverage (so a fixed
# value never clips a legitimate per-trade-margin trade as the account grows). The
# value below is only the FALLBACK absolute max used when tiered/equity is briefly
# unavailable. Hard rails still bind (CHECK 3 concurrency = tiered max_positions,
# CHECK 4 per-trade margin + in-cycle book guard, CHECK 5 duplicate, exchange
# min/max). Set max back to 1200 + brain_authoritative_sizing_enabled=false to revert.
max_position_size_usd = 4000
max_leverage = 5
min_tias_trades_for_optimization = 3
# When true the downstream HONORS the brain's size_usd (APEX won't shrink below it;
# gate CHECK 4 becomes the per-trade MARGIN ceiling = usable/max_positions,
# leverage-aware, NOT a conviction shrink). Instant revert: set false (restores
# today's exact behaviour).
brain_authoritative_sizing_enabled = true
# FALLBACK-ONLY per-trade ceiling as a fraction of available capital, used by gate
# CHECK 4 ONLY when tiered_capital/equity is unavailable (the live path instead caps
# per-trade MARGIN at usable/max_positions). 0.40 of available is a safe degrade.
brain_auth_per_trade_pct_of_available = 0.40
min_regime_trades_for_fallback = 10

# Issue B fix (2026-05-08) — bounded retry on transient OpenRouter
# failures. Pre-fix every "OpenRouter response has no choices" /
# empty-content / non-JSON body fired immediately fell back to
# Claude's directive ("NO RETRY" architectural note in
# qwen_client.py:7-9). The 13:00–16:00 UTC 2026-05-08 audit showed 4
# such failures clustered in 16 minutes — textbook transient
# upstream wobble that a single retry would have likely smoothed.
# ``apex_max_attempts = 2`` means: 1 initial call + at most 1 retry.
# ``apex_retry_backoff_seconds = 0.7`` is the sleep between attempts.
# Set ``apex_max_attempts = 1`` to restore pre-fix no-retry behaviour.
# After retry exhaustion (or on a non-retryable error like HTTP
# non-200, timeout, or connection error) the existing fallback path
# fires — ``APEX failure NEVER blocks a trade`` is preserved.
apex_max_attempts = 2
apex_retry_backoff_seconds = 0.7

# Guardrails
min_tp_pct = 0.3
gate_tp_floor_enabled = true
gate_trail_activation_floor_pct_of_tp = 15.0
gate_trail_distance_floor_pct = 40.0
gate_mode_override_enabled = true
gate_confidence_floor = 0.50
# Hard size-cap: APEX/conviction inflation cannot exceed 1.5× Claude's
# pre-APEX directive size. Gate CHECK 0 enforces this and logs
# CONVICTION_SIZE_CAP when it binds. Set 0 to disable.
gate_apex_size_cap_mult = 1.5

# Conviction Allocator
conviction_enabled = true
conviction_min_trades = 3

# APEX Direction-Flip Switch (IMPLEMENT_APEX_FLIP_SWITCH, 2026-05-25).
# Master on/off for APEX's ability to REVERSE the brain's direction.
# false = the brain's direction executes and APEX still optimizes
# stop/target/size/leverage for it (operator default, set to begin
# measuring the flip-off effect; symmetric with the X-RAY switch which is
# also off); true = pre-switch behavior (APEX may reverse direction).
# Does NOT affect APEX's optimization, the model prompt, or the win-rate
# queries. Boot sentinel APEX_FLIP_SWITCH_SENTINEL reports the state.
apex_dir_flip_enabled = false
# Issue 2.3 (2026-06-07): APEX leverage-override kill-switch, symmetric with the
# flip switch. false (default) = APEX may NOT raise leverage above the brain's
# directed leverage (the brain's leverage stands; SL/TP/size optimization is
# preserved); true = pre-switch behavior (APEX leverage stands). Boot sentinel
# APEX_LEVERAGE_OVERRIDE_SENTINEL reports the state.
apex_leverage_override_enabled = false
# Five-Fix Follow-Up — Fix 5 (2026-06-10): APEX size-override kill-switch,
# symmetric with the flip and leverage switches above. The optimizer LLM
# proposes its OWN size and the J5 dynamic-sizing adopted it, so the executed
# size could land up to gate_apex_size_cap_mult times the brain's deliberate
# size_usd (proven live: brain 700 dollars, executed 1050). false (default,
# operator decision 2026-06-10) = the brain's parsed size flows UNMODIFIED to
# the order and the gate's A+ ceiling boost is inert; every safety validation
# (gate CHECK 0/1/2/4/5, breadth-brake, enforcer, exchange minimum) stays in
# force. true = pre-switch sizing behaviour, byte-identical. Boot sentinel
# BOOT_APEX_SIZE_OVERRIDE reports the state. The leverage x2/x3/x5 effect on
# position notional is the brain's OWN chosen leverage (margin times
# leverage) and is not touched by this switch.
apex_size_override_enabled = false

# Issue E18 (2026-05-27): A+ size-boost confidence floor (gate CHECK 4).
# Withholds the +20% A+ size boost when X-RAY structural confidence is below
# gate_a_plus_conf_floor, so a high score with no structural confidence is
# never upsized. 0.70 enables the guard (matches the structural-ladder
# baseline at gate.py); set 0.0 to restore the always-boost behaviour.
# Sizing-only — never blocks a trade; the boost still fires on confident A+.
gate_a_plus_score_threshold = 80.0
gate_a_plus_size_mult = 1.20
gate_a_plus_conf_floor = 0.70

# Issue E17 (2026-05-27): structureless-but-scored reject (gate CHECK 4).
# Rejects ONLY when X-RAY structural confidence <= conf_floor AND setup_score
# >= score_min — the score/confidence contradiction. score_min 65 sits just
# above #7's matched-weak B-cap (64), so this catches the leak band #7
# guarantees is impossible for legitimately-weak coins, and a real aggressive
# entry (which always has confidence above 0.05) is never touched. Belt-and-
# suspenders behind #7; set conf_floor=0.0 and score_min=999 to disable.
gate_structureless_conf_floor = 0.05
gate_structureless_score_min = 65.0

# Entry-quality filters (win-rate enhancement, 2026-07-07). Per-leg entry
# minimums from ENTRIES_QUALITY_DIAGNOSIS.md — each leg individually flipped
# the audited 395-trade June 17-18 window positive (signal_conf >= 0.50:
# 45% win +$5.10; xray_conf >= 0.40: 53% win +$2.90; ADX >= 25: 48% win
# +$3.40). All three are ONE-WINDOW hypotheses: the gate logs every reject
# (GATE_REJECT reason=entry_quality_*) AND every pass
# (GATE_ENTRY_QUALITY_PASS) with the raw values, so after ~300 GLM-era
# trades each leg can be validated or killed independently against realized
# PnL. A leg with UNKNOWN input (-1.0 sentinel from layer_manager, package/
# block missing) fails OPEN. Rollback: set enabled = false (or zero any
# single leg's min to disable just that leg).
entry_quality_filters_enabled = true
entry_quality_signal_conf_min = 0.50
entry_quality_xray_conf_min = 0.40
entry_quality_adx_min = 25.0

# Issue 7 (2026-06-08) — portfolio directional-drawdown breaker. Halts NEW
# same-direction entries once the open book is over-concentrated in that
# direction AND the aggregate open (unrealized) loss across that direction's
# positions exceeds open_loss_pct of equity. Never closes runners; only halts the
# over-concentrated direction. Default OFF — one session can't size the
# threshold; review more correlated-drawdown data, then set enabled=true.
#   min_positions: a real book must exist before it can fire.
#   concentration: long/short skew (0-1) that counts as one-directional.
#   open_loss_pct: aggregate same-direction open loss as % of equity to halt.
portfolio_dd_breaker_enabled = false
portfolio_dd_breaker_min_positions = 3
portfolio_dd_breaker_concentration = 0.80
portfolio_dd_breaker_open_loss_pct = 1.5

# H4 (2026-05-16) — reentry learning gate calibration. Phase 1
# evidence (dev_notes/four_high_fixes/h4_phase1_rejection_trace.md)
# showed 31 of 54 directives blocked by the J6 same-conditions gate
# over a 5h baseline — 26 % cited losses > 16 h old (DYDXUSDT cited a
# 60-hour-old loss), 26 % cited losses under $2 (ARBUSDT $-0.04,
# AVAXUSDT $-1.03, SKRUSDT $-1.57), and 71 % traced to a single
# 2-second exit-cohort event whose context had drifted by the time of
# the next re-entry. These three escapes preserve the gate's original
# protective intent (block genuinely-fresh + meaningful + same-context
# revenge re-entries) while removing the over-blocking pattern.
#
#   reentry_learning_gate_lookback_hours: recency clamp. Prior losses
#     older than this window do not block. 0 = no clamp (legacy).
#     6.0 = balanced (the typical session-to-session drift window).
#   reentry_learning_gate_min_loss_usd: magnitude floor. Prior losses
#     with |pnl_usd| at-or-below this value do not block. 0 = no floor.
#     5.0 = above taker-fee + slippage noise but below typical R losses.
#   reentry_learning_gate_price_drift_pct: price-drift escape. When the
#     current price has moved from the prior thesis's entry_price by
#     at least this percent, re-entry is allowed even on same conditions.
#     0 = no escape. 1.5 = a ~1.5 % move is operationally meaningful in
#     crypto futures over a 10-30 min cycle.
#
# Aim-bias verdict (operator-confirmed 2026-05-16 plan session): each
# escape RAISES trade frequency and PRESERVES aggression. Reject rate
# expected to drop from 57.4 % to under 25 %.
reentry_learning_gate_lookback_hours = 6.0
reentry_learning_gate_min_loss_usd = 5.0
reentry_learning_gate_price_drift_pct = 1.5

# Definitive-fix Phase 9 (2026-04-28) — flip discipline.
# Forensic S3 captured an APEX flip Sell→Buy that produced
# simultaneous long-BTC + short-ETH despite a bearish brain thesis on
# both. The legacy direction-lock was strict in trending and
# volatile-without-evidence regimes but unconstrained in
# ranging/dead/unknown. These two knobs close the loophole:
#   apex_min_flip_confidence: confidence floor (0..1) for any flip in
#     ranging / dead / unknown. DeepSeek's reported confidence MUST
#     clear this; below it, the flip is reverted by the existing
#     APEX_DIR_LOCK_OVERRIDE machinery. 0.90 is intentionally high —
#     "either you're very sure, or you don't get to flip".
#   apex_block_flip_resize: when true, a flip cannot UPSIZE the
#     position above Claude's original. Smaller Qwen sizing on a flip
#     is ALLOWED (de-risks lower-conviction flips). Setting to false
#     disables both the upsize cap and the downsize allowance — full
#     Qwen size wins. Semantic narrowed in Post-Execution Closure Fix
#     Phase 2 (2026-05-05); the prior "one change per directive" rule
#     forced flipped trades to full-conviction sizing despite a
#     lower-conviction direction change.
# Phase 3 of dir-block-fix (2026-05-05): lowered 0.90 → 0.70 so
# moderately-confident flips backed by strong RR can pass. All four
# 2026-05-05 24-h APEX_FLIP_BLOCKED events had Qwen confidence 0.85,
# just below the prior 0.90 floor — pure threshold churn.
apex_min_flip_confidence = 0.70
apex_block_flip_resize = true
# Phase 3 of dir-block-fix (2026-05-05): RR-weighted boost applied
# inside _enforce_flip_confidence. When the flipped direction's
# structural R:R is ≥ apex_flip_rr_boost_threshold × the chosen
# direction's R:R, the effective confidence used by the gate is
# raw_confidence + apex_flip_rr_boost_amount. Gate-local; does not
# propagate downstream.
apex_flip_rr_boost_threshold = 3.0
apex_flip_rr_boost_amount = 0.15

# PRIMARY Sell-Bias Fix (2026-05-11) — asymmetric flip thresholds.
# The 2026-05-11 investigation surfaced that Buy→Sell flips destroy win
# rate (shadow: -16.1 pp; bybit_demo: -6.8 pp) while Sell→Buy flips help
# mildly (shadow: +10.4 pp). Per-pair thresholds let the operator tighten
# the harmful side without losing the helpful side. Resolution order in
# _enforce_flip_confidence (src/apex/optimizer.py): direction-pair-specific
# floor wins; falls back to apex_min_flip_confidence above. RR-boost still
# applies on top. See dev_notes/sell_bias_fixes/p_phase1_flip_performance.md.
#
# Phase 1B symmetric realignment (2026-05-19) — both directions now use
# the same threshold (0.70) which equals the global apex_min_flip_confidence
# floor at config.toml:1533. Was asymmetric: buy_to_sell=0.95 (harder to
# flip Buy out), sell_to_buy=0.70 (easier to flip into Buy) = Buy-favoring
# tilt. Per operator directive: per-coin scenarios decide direction, not
# hardcoded directional thresholds. Phase 2B collapses these two fields
# to a single non-directional apex_min_flip_confidence. To revert: set
# buy_to_sell back to 0.95 + restart.
apex_min_flip_confidence_buy_to_sell = 0.70
apex_min_flip_confidence_sell_to_buy = 0.70

# PRIMARY Sell-Bias Fix (2026-05-11) — insufficient-data flip gate.
# Code-enforced rule: block a direction flip when the flipped direction
# has fewer than N trades in the current regime for this symbol. Closes
# the feedback loop where prior Sell-biased flips inflate Sell history
# and license further Sell flips. Set 0 to disable.
# E27 (2026-05-28): raised 5 -> 8 to demand a more durable sample before
# a flip is licensed. This is the AUTHORITATIVE, binding gate (it reverts
# any flip below N regardless of what DeepSeek proposes). The DeepSeek
# system-prompt advisory still says "fewer than 5" (a softer hint); the
# code gate is stricter and wins, so the prompt wording was left untouched
# to avoid a live-prompt change. Latent today: this gate is only reached
# under was_flipped, and direction flips are disabled
# (apex_dir_flip_enabled=false), so raising it has no live effect now.
apex_min_trades_for_flip = 8

# Phase 1A neutralization (2026-05-19) — disable GAMMA R4 portfolio
# direction concentration cap. Per operator directive: hardcoded
# thresholds (70% concentration, 2.0x opposite-RR, min 3 positions)
# violate the design principle "sell and buy should both work
# according to the best scenarios, not hardcoded saying if sell this
# much then buy this much." Setting enabled=false makes the cap a
# no-op without removing the code (deprecate-then-delete pattern).
# Phase 2 (deferred 48-72h pending trial) removes the gate.py:649-810
# block and the 5 dataclass fields entirely. To revert: set this line
# back to true OR delete the line + restart trading-workers and
# trading-mcp-sse. See dev_notes/dirbias_validation/phase0_neutralization_baseline.md.
portfolio_direction_cap_enabled = false

# PRIMARY Sell-Bias Fix (2026-05-11) — counter-trade respect.
# The scanner emits COUNTER_TRADE_LONG / COUNTER_TRADE_SHORT secondary
# labels (91 events in the 2026-05-11 9-h window) and brain takes them
# as deliberate contrarian Buys / Sells. Pre-fix, APEX would then often
# flip these back to the structural direction, destroying the operator-
# designed contrarian alpha. When true, APEX cannot flip direction on
# trades whose package.structural_data.setup_type contains "counter"
# (case-insensitive). XRAY (downstream in strategy_worker) is NOT
# affected by this flag — its flip path is governed by
# settings.risk.xray_dir_flip_threshold_ratio.
apex_respect_counter_trade = true

# Per-class TP cap multiplier (× recommended_tp_pct from volatility profiler).
# Applied after DeepSeek responds; clamps absurd TPs back to class-appropriate
# room. Dead coins cap near 1.4× base (~0.42-0.70%); extreme coins stretch to
# 2.0× (~10%, then hard 5% ceiling kicks in). See optimizer.py APEX_TP_CAP log.
# Phase 5 of dir-block-fix (2026-05-05): raised every class so Qwen
# can recommend larger TPs when supported by structure. The hard 5 %
# ceiling enforced inside optimize() prevents wild outliers regardless
# of class multiplier.
[apex.tp_cap_multiplier_by_class]
dead = 1.4
low = 1.5
medium = 1.6
high = 1.8
extreme = 2.0

# =============================================================================
# SENTINEL — Exit Firewall + Smart Deadline + Portfolio Advisor
# =============================================================================
[sentinel]
enabled = true

# Part 1: Exit Firewall — blocks strategic review from closing positions
firewall_enabled = true

# Part 2: Deadline Engine — tiered expiry logic based on PnL
deadline_profit_pct = 0.5
deadline_breakeven_lower_pct = -0.3
deadline_small_loss_pct = -1.5
deadline_grace_minutes = 5.0
deadline_small_loss_sl_pct = 0.5

# Part 3: Portfolio Advisor — DeepSeek V3 risk assessment every 5 min
advisor_enabled = true
advisor_interval_seconds = 300
advisor_model = "deepseek/deepseek-chat-v3-0324"
advisor_temperature = 0.2
advisor_max_tokens = 800
advisor_timeout_seconds = 30
# TRADE LIBERATION: Min profit before allowing stop tightening (%)
advisor_min_profit_for_tighten_pct = 0.50

# =============================================================================
# X-RAY — Structural Market Intelligence Engine
# =============================================================================
# Detects support/resistance, market structure (BOS/CHoCH), structural SL/TP.
# Runs as a background worker refreshing structural analysis per coin.

[analysis.structure]
enabled = true
worker_interval_seconds = 60
cache_ttl_seconds = 300
min_candles = 50
swing_lookbacks = [3, 5, 10]
cluster_pct = 0.3
min_touches = 2
# Issue 1 of 2026-05-19 direction-bias fix Phase C — symmetric
# resistance touch filter. Legacy behavior at
# src/analysis/structure/support_resistance.py:126 hardcoded `>= 1`
# for resistance while support uses min_touches=2. In sustained
# downtrending markets, the asymmetry filtered out single-touch swing
# lows but kept single-touch swing highs, producing sup=0 res=5 in
# 80.7% of audited XRAY_ANALYZE rows. The result was rr_long
# collapse → cascading Buy → Sell flips at execution. Default 2
# symmetrizes with support. Operator may lower to 1 for markets
# where single-touch resistance detection is desired.
min_touches_resistance = 2
# Issue 1 of 2026-05-19 direction-bias fix Phase C — minimum-edge
# floor on structural_tp distance from current_price. Consumed by
# _calc_long at structural_levels.py:97-145 and _calc_short at
# :155-215. When the nearest resistance/support is closer to
# current_price than tp_min_distance_pct, the structural_tp is
# clamped to be at least this far away and StructuralPlacement's
# is_structurally_invalid flag is set so downstream consumers can
# qualify their handling. Prevents rr_long (or rr_short) from
# collapsing toward zero when price is at or near a level. Default
# 0.5% — well below the typical SL distance of 1-2% so legitimate
# tight setups still register but pathological collapses are clamped.
tp_min_distance_pct = 0.5
max_levels_per_side = 5
ms_swing_lookback = 5
ms_min_swing_points = 3
sl_buffer_pct = 0.15
tp_buffer_pct = 0.10
min_rr_ratio = 2.0
sl_fallback_pct = 2.0
tp_fallback_pct = 4.0
# RR/direction-conflict fix Phase 2 (2026-05-31). When ON, an X-RAY setup whose
# trend-implied direction has materially worse reward-to-risk than the opposite
# VALID side is re-pointed to the better-RR side (setup_type/trade_direction/
# label/placement follow). Default OFF — enable for a live trial. ratio = the
# opposite/chosen RR multiple required to trigger (matches the prompt's ">=2x").
rr_aware_direction_enabled = false
rr_aware_direction_ratio = 2.0
# Direction-reconcile fix (2026-06-04, Problem 8) — NEUTRAL source fix. When ON,
# an X-RAY setup whose trend-implied direction has materially worse reward-to-risk
# than the opposite VALID side ABSTAINS (trade_direction cleared, grade capped to
# C/<=49) instead of asserting an A+ score-100 short into a falling-knife bottom.
# Stops the upstream contamination that made the prompt RR-rule and the P1/P6 gate
# fight (F25/F34) and prevents the long-bias flip (F11) — the brain then decides
# from the coin's own evidence and the regime/WR/APEX backstops judge it. Keep
# rr_aware_direction_enabled OFF while this is ON (they are mutually exclusive).
# ratio = opposite/chosen RR multiple required to abstain (matches the ">= 2x" rule).
xray_abstain_on_invalid_rr_enabled = false
xray_abstain_rr_ratio = 2.0
# F33 (2026-06-05) — confluence-paradox PRESENTATION. When the X-RAY structurally-
# implied side is the worse, roomless reward-to-risk side (its own RR below
# confluence_veto_rr_floor) while the better side leads by >= confluence_veto_ratio,
# the candidate block prints an explicit NOTE that the confluent direction is vetoed
# for no room. Clarity/observability only; the RR veto decision is unchanged.
confluence_veto_note_enabled = true
confluence_veto_rr_floor = 1.0
confluence_veto_ratio = 2.0
# Fix2 (2026-06-05) — with-trend continuation TP. In a confirmed trend, a valid
# (not min-edge-clamped) WITH-TREND structural TP whose reward sits closer than
# continuation_tp_min_atr_mult x H1-ATR reads as 'no reward room' (RR<1) and the
# brain skips the profitable with-trend short/long — the artifact that suppressed
# with-trend volume. The TP is re-anchored to an ATR-projected continuation
# target (continuation_tp_atr_mult x ATR) further in the trend direction, taking
# only the FURTHER price (never closer). Pure ATR projection, bounded; trend-side
# only; ranging/counter-trend/ATR<=0/already-clamped untouched. Default ON; set
# xray_continuation_tp_enabled=false to revert.
xray_continuation_tp_enabled = true
continuation_tp_min_atr_mult = 1.5
continuation_tp_atr_mult = 2.5
# Issue 3 (CALL_A exploit/fetch, 2026-06-05) — directional-RR setup scoring. The
# X-RAY setup score graded reward-to-risk off rr_ratio = rr_best = max(long, short),
# so a spent downtrend short (rr_short ~0.1) scored A+/100 on the LONG side's RR and
# bypassed the <0.5 -> SKIP cap. The scorer now grades the CHOSEN direction's RR
# (rr_short for a short, rr_long for a long); rr_ratio = rr_best stays intact for the
# prompt display, APEX and scanner ranking. That correction is a bug fix (always on).
# range_no_room_penalty additionally docks a setup whose range geometry is spent — a
# short at pos <= range_floor_threshold (no room below) or a long at
# pos >= 1 - range_floor_threshold (no room above). Symmetric. Tuning starting
# points; set range_no_room_penalty = 0 to disable just the range component.
range_floor_threshold = 0.05
range_no_room_penalty = 25
# Four-Element Prompt Recalibration, Element 3 (2026-06-11) — range-truth
# render gate. The engine now stores the pre-clamp truth (range_breakout,
# range_overshoot_pct as a percent of the broken boundary's price) beside the
# clamped position_in_range (which is unchanged for every scorer/label/SLTP
# consumer). When true, the brain-facing lines append the marker — e.g.
# "range_pos=0.00 (BELOW RANGE by 2.3% — breakdown, not a floor)" — so a
# breakdown can never again read as a floor invitation (June-11 DYDX: 0.00 on
# all 24 submissions while price fell THROUGH the range). Set false to restore
# the prior BRAIN-facing prompt bytes exactly; the fields keep computing either
# way, and the advisory APEX structural block keeps its truthful marker (it is
# keyed off field presence, not this flag — see the Element 3 report).
range_truth_enabled = true
# Issue 3 (structure confluence, 2026-06-06) — graded SMC confluence. The legacy
# scorer added FLAT lumps on a binary present/absent test (FVG 25, OB 30, liquidity
# 15, sweep 30), so ~81% of coins landed on the same smc_confluence = 70 (the
# "structure confluence constant" the operator observed). It now scales each
# component within [0, its weight] by that coin's own zone quality — proximity to
# price plus the zone's strength / freshness — so the score spreads per coin and
# feeds true relative quality into the setup_score SMC bonus and the prompt. The
# four weights are the per-component maxima (same caps and same 0-100 ceiling as
# before, so the >=70 / >=40 / >=20 SMC bonus thresholds stay calibrated); the
# proximity windows mirror the old binary thresholds; sweep recency is the candle
# window over which a sweep's contribution decays. Tuning starting points.
smc_weight_fvg = 25.0
smc_weight_ob = 30.0
smc_weight_liq = 15.0
smc_weight_sweep = 30.0
smc_fvg_proximity_pct = 2.0
smc_ob_proximity_pct = 3.0
smc_sweep_recency_candles = 20
# Issue 2 (X-RAY de-saturation, 2026-06-06) — the setup_score's additive modifiers
# summed past the 0-100 ceiling for any decent setup, so the clamp pinned the
# majority of coins at exactly 100 (grade A+ only, the middle of the range empty,
# zero coins at A or C). modifier_scale compresses the NET modifier around the
# neutral base 50: relative ordering is preserved exactly, but the score gains
# headroom so strong setups land near the top, typical ones mid-range, weak ones
# low — the grades now spread across A+/A/B/C and the coin filter ranks on real
# relative quality. 1.0 = pre-fix overflow; lower = more spread. The grade
# thresholds are unchanged values, centralized for tuning. The spent-short
# directional de-grading (hard caps) runs after this and is NOT affected.
setup_score_modifier_scale = 0.5
setup_grade_a_plus_min = 80
setup_grade_a_min = 65
setup_grade_b_min = 50
setup_grade_c_min = 35
# Phase 2: Smart Money Concepts
fvg_min_gap_pct = 0.1
fvg_max_age_candles = 50
ob_displacement_min = 0.6
ob_max_age_candles = 50
liq_equal_tolerance_pct = 0.05
liq_min_equal_count = 2
liq_round_number_step = 100.0
sweep_max_age_candles = 10
sweep_min_wick_pct = 0.3
# Phase 1c (2026-05-05): XRAY confidence reachability fix. Bounds the
# ``_check_swept`` scan to a recency window AND requires the canonical
# sweep+reclaim pattern. Pre-fix the unbounded historical scan marked
# nearly every zone swept (any wick over ~200 bars), capping SMC
# confluence at 55/100 (FVG=25 + OB=30 only). Post-fix, zones whose
# violations are stale (>30 bars) or whose violation has no later
# reclaim within the window stay unswept, restoring the +15 liquidity
# and +30 sweep contributions when warranted.
#
# sweep_recency_bars: lookback window for the violation+reclaim scan.
# Default 30 (3× sweep_max_age_candles).
#
# sweep_require_reclaim: when true, requires a later bar that closes
# back through the level. When false, falls back to wick-only
# detection within the recency window. Default true.
sweep_recency_bars = 30
sweep_require_reclaim = true
# Phase 4: Intelligence
setup_scanner_mode = "supplement"
# Layer 1 universe alignment (Phase 6 cleanup): structure_worker now
# reads scanner.get_active_universe() directly — CoinDiscovery, the
# scan_full_market gate, and coin_refresh_interval are removed.
#
# Definitive-fix Phase 1 (2026-04-28): batch_size raised 25 → 50 so the
# whole watch_list (50 coins) is re-analyzed every tick. Forensic
# C.1.4 measured ~580 ms per 25-coin tick; 50 coins ≈ 1.2 s — still
# safely under the 5-min sweet-spot window — and resolves the prior
# half-universe-stale problem that left ScannerWorker rejecting 25 of
# 50 coins per cycle with `fail_no_xray`. StructureCache TTL=300 s now
# matches the 5-min sweep cadence exactly. Tick latency must stay
# under 4 s; XRAY_CACHE_HEALTH carries `tick_el_ms` so regressions are
# visible.
batch_size = 50
shadow_db_path = "../shadow/data/shadow.db"

# Issue #5 (2026-05-31) — wire higher timeframes (H4 + Daily) into the X-RAY
# MTF confluence scorer. Default false: behaviour is byte-for-byte today's
# H1-only MTF. Daily klines are already fetched hourly by kline_worker but were
# consumed by nothing downstream; enabling this lets the structure worker also
# read H4 + D1, compute a cheap direction-only structural view per TF (cached to
# each TF's kline cooldown), and blend a BOUNDED cross-timeframe agreement signal
# into the existing 0-10 MTF score (+/- mtf_htf_weight). This MTF score gates
# setup classification, scanner ranking, and the brain prompt, so enabling it
# requires an operator restart + trial. Watch XRAY_TICK_SUMMARY el_ms and the
# MTF score / XRAY_CLASSIFY_SUMMARY distribution; instant rollback = set false +
# restart. The XRAY_MTF_MULTI_TF_INIT log confirms the flag is live.
mtf_multi_timeframe_enabled = false
mtf_timeframes = ["240", "D"]    # higher TFs beyond H1 ("240"=H4, "D"=Daily)
mtf_h4_cache_ttl_seconds = 300   # aligns to kline H4 fetch cooldown
mtf_d1_cache_ttl_seconds = 3600  # aligns to kline D1 fetch cooldown (~hourly)
mtf_htf_weight = 0.25            # alpha — bounds HTF influence to +/-25% of score
mtf_htf_limit = 120              # candles fetched per higher timeframe

# Layer 1 restructure Phase 2 — categorical setup classification
# thresholds. Conservative defaults; relax via Phase 9 observation.
#
# Definitive-fix Phase 2 (2026-04-28): fvg_ob_min_confluence 0.7 → 0.5.
# Forensic C.1.3 showed legitimate FVG+OB confluence rejected at
# mtf_score=0.40-0.65 because the 0.70 gate is unrealistic outside
# strongly trending markets. 0.50 means "more than half of the higher
# timeframes align" — still a confluence requirement, just achievable
# in normal conditions. classify_setup() reads this verbatim from
# config (structure_engine.py:701); no code change required.
[analysis.structure.setup_types]
fvg_ob_min_confluence = 0.5
# XRAY counter-setup Phase 6 (Lever B) — relaxed from true to false on
# 2026-04-30. Pre-fix BULLISH/BEARISH_STRUCTURAL_BREAK required
# last_bos.significance == "major", which rejected the 5 BoS-only coins
# observed in the live forensic (XRPUSDT, PLUMEUSDT, EGLDUSDT,
# ALICEUSDT, SANDUSDT — all classified NONE because of minor BoS).
# Minor BoS still represents in-direction structure (less confirmed
# than major), so it now fires with confidence reduced by
# structural_break_minor_confidence_multiplier (0.8) to reflect the
# weaker confirmation. Major BoS confidence is unchanged.
structural_break_require_retest = false
structural_break_minor_confidence_multiplier = 0.8
sweep_min_displacement_pct = 0.5
range_breakout_min_compression_bars = 20
mtf_alignment_required = true
# Definitive-fix Phase 3 (2026-04-28): alignment helpers now accept
# ``ranging`` market structure when mtf_score_01 clears this threshold,
# so a clean FVG+OB confluence in a ranging market with HTF backing
# can classify as BULLISH/BEARISH_FVG_OB instead of NONE. Volatile and
# strict cross-direction (long+downtrend / short+uptrend) still reject.
ranging_market_mtf_threshold = 0.55
# Issue 6 (2026-06-08) — FVG-OB-in-ranging down-weight. The fair-value-gap
# order-block setup in a ranging regime at low confidence was the single largest
# loss driver (all 7 win-prob cuts, ~ -$240, both directions). Multiply the
# FVG-OB confidence by this discount when the regime is ranging so it scores
# lower (selected less by the rank-only funnel) and sizes smaller (size scales
# with confidence, floored at 0.5). A down-weighting, NOT a gate or exclusion.
# Must be in (0, 1]; 1.0 = off (no discount).
fvg_ob_ranging_confidence_discount = 0.75

# XRAY counter-setup Phase 2 (2026-04-30): ATR-scaled distance windows
# for the _find_nearest_fvg/ob proximity check. The pre-fix fixed
# percentages (2.0% FVG, 3.0% OB) gave low-vol coins (BTC at 0.42% ATR)
# a 4.8-ATR window — too loose — and high-vol coins (DYDX at 1.30% ATR)
# a 1.5-ATR window — too tight. New formula:
#   window_pct = max(min_distance_pct, atr_multiplier * atr_pct_h1)
# atr_pct_h1 is computed inline by StructureEngine._compute_h1_natr_pct
# from the H1 candles already in hand (no dep on volatility_profile).
# The floor (min_distance_pct) keeps very-low-vol coins from getting
# near-zero windows when ATR collapses.
fvg_atr_multiplier = 3.0
ob_atr_multiplier = 4.0
fvg_min_distance_pct = 2.0
ob_min_distance_pct = 3.0

# XRAY counter-setup Phase 4 (2026-04-30): counter-direction setup
# variants fire when the suggested direction's in-direction zones are
# missing but the OPPOSITE direction has tradeable FVG+OB structure
# near price. Confidence is reduced (× counter_confidence_multiplier)
# so downstream consumers (TradeScorer Quality, opportunity_score
# struct_norm, ensemble size_mult) downweight counter setups vs
# in-direction ones. Lower counter_mtf_threshold than fvg_ob_min
# (0.40 vs 0.50) since counter setups are already lower-conviction —
# don't double-penalize on MTF. counter_alignment_strict=true tightens
# the structure gate to {opposite-direction-trend, ranging} only.
counter_setup_enabled = true
# Issue 2 Concern 7 (2026-05-19): config-only test of removing the
# ×0.7 multiplier. Set to 1.0 for the 48h Phase A trial. Producer at
# src/analysis/structure/structure_engine.py:1188, 1210 then becomes a
# no-op multiply, and the 4 downstream floor-0.5 multipliers in
# scorer.py:494 / ensemble.py:158 / scanner_worker.py:288 / apex/gate.py:218
# see un-cut counter confidence — eliminates the ~3.88× compounding
# suppression on counter-LONG setups that the 14-day WR data flagged as
# selecting Buys from a low-conviction sub-pool. Reversible in seconds
# via `git checkout config.toml && restart`. Decision matrix at
# dev_notes/dirbias_validation/MASTER_REPORT.md determines whether to
# ratify with code removal (Option 7.2) after the 48h trial. Original
# value 0.7 was set in commit 3a59637 (2026-04-30, XRAY counter-setup
# Phase 4) as an unempirical heuristic, no backtest, no tuning since.
counter_confidence_multiplier = 1.0
counter_mtf_threshold = 0.40
counter_alignment_strict = false

[analysis.volatility_profile]
enabled = true
# Phase 5 (P0-4 DB Contention): TTL 120 s + per-symbol jitter window of
# +/- 30 s spreads expirations across a full 60 s window. With 30 coins
# and uniform hash distribution that's ~1 expiration every 2 s instead
# of 30 in a single second. Eliminates the thundering-herd recompute
# storm that pegged WD_TICK_SLOW > 5 s.
cache_ttl_seconds = 120.0
jitter_range_seconds = 30
dead_threshold = 0.05
low_threshold = 0.15
medium_threshold = 0.40
high_threshold = 1.00
min_tp_pct = 0.30
min_sl_pct = 0.20
max_tp_pct = 8.0
max_sl_pct = 5.0

# =============================================================================
# Time-Decay Loser-Lane SL (5-model institutional exit intelligence)
# =============================================================================
# Runs inside PositionWatchdog only when pnl_pct < 0. Combined formula:
#   allowed = atr_room × time_factor × recovery × momentum × probability
#   allowed = max(allowed, min_allowed_loss_pct)  # 0.15% floor
#   allowed = min(allowed, original_sl_pct)       # never widen SL
# Force-closes when p_win < p_win_force_close. Propagates tighter-only SL
# via _push_sl_to_shadow (source="time_decay"). All scalar defaults come
# from TimeDecaySettings in settings.py; per-class overrides below.
[time_decay]
enabled = true

# Issue 3 (2026-06-08) — recovery-responsive tightening. The MAE monotonic hold
# pins the stop at the worst excursion's wide budget through a genuine recovery.
# When the trade has recovered past mae_tightening_recovery_threshold (fraction
# of its worst MAE), tighten the stop toward the recovered level (a tight
# bounce-capture near the least loss) leaving recovery_tightening_buffer_pct
# below current price so a still-running recovery is not cut. High threshold so a
# moderate recovery still gets room. enabled=false = off-switch.
mae_recovery_tighten_enabled = true
mae_tightening_recovery_threshold = 0.75
recovery_tightening_buffer_pct = 0.3

# Phase 1 (Time-Decay Force-Close Definitive Fix, 2026-05-06) —
# minimum-age guardrail for force-close. Stricter than per-class grace
# (30-240 s). Suppresses BOTH the force-close sentinel and the tighter-SL
# push when position age is below this value. Mirrors
# `watchdog.strategic_action_min_hold_seconds = 300` so the time-decay
# path is held to the same 5-minute settling contract as CALL_B closes
# (the existing minimum-hold guardrail at position_watchdog:2410 covers
# CALL_B but does NOT cover the time-decay close path which bypasses
# _execute_strategic_actions and calls position_service.close_position()
# directly). Set to 0 to disable.
min_age_seconds = 300

# Phase 2 (Time-Decay Force-Close Definitive Fix, 2026-05-06) —
# MAE-relative-to-SL gate for force-close. Suppresses force-close (and
# tighter-SL push) when the position's worst drawdown to date has not
# reached this fraction of its original SL distance. At 0.5 (default),
# a position must lose at least half of its original SL allocation
# before time-decay can fire. Below that, the trade is still in
# normal-development territory — killing it captures noise rather than
# real failure. Phase 0 baseline: 33/33 force-closes in the 12h window
# fired at MAE/SL ratio < 0.36, all of which Phase 2 would suppress.
# Set to 0 to disable.
mae_to_sl_ratio_threshold = 0.5

# Phase 3 (Time-Decay Force-Close Definitive Fix, 2026-05-06) —
# structural-invalidation gate. Force-close fires only when there's
# real evidence of structural failure: XRAY confidence drop >=
# `xray_drop_threshold` from entry, OR setup-type drift, OR regime
# inverted at >= `regime_inversion_confidence_threshold`. Watchdog
# computes the boolean per-tick from `structure_cache` and
# `regime_detector`; cache-miss is fail-safe block. The watchdog seeds
# entry-time anchors on TimeDecayState at first-loser-tick from
# TradeCoordinator.TradeState (preferred) or `trade_thesis` v27 columns
# (fallback after watchdog restart for in-flight positions). Set
# `structural_invalidation_required = false` to disable the gate
# (preserves pre-fix p_win-only behaviour for back-compat / debugging).
structural_invalidation_required = true
# Issue 2.6 (2026-06-07): slow-bleed cumulative-drawdown force-close. When a
# trade is statistically dead (p_win < p_win_force_close) AND has bled past this
# cumulative loss, the structural-invalidation guard yields so the force-close
# fires — catches the slow structureless grind the guard otherwise holds to the
# plain stop. A recovering winner carries a higher p_win, so this band is a
# clear loser, not a winner. Default OFF pending the offline check; set true to enable.
slow_bleed_cumulative_force_close_enabled = false
slow_bleed_cumulative_loss_pct = 2.5
# F4/F4b/F7 (2026-06-09): standalone monotonic-grind force-close — the DOGE-grind
# lever. A p_win-INDEPENDENT cut for a trade that has STALLED at its worst
# excursion for a sustained run with no bounce (monotonic_grind_sustained_ticks
# consecutive ticks pinned within monotonic_grind_near_trough_band_pct of its
# running MAE) and crossed monotonic_grind_min_loss_pct. This is the dying slow
# grind the mae_to_sl_ratio_threshold (0.50) gate never reaches on a low-vol coin
# (its drawdown stays under half the SL distance, so the trade rides to its stop).
# Fires AFTER the min-age guard and BEFORE the MAE-to-SL gate. Does NOT read p_win.
# DEFAULT OFF. Offline-validated on the 2026-06-08 DOGE-vs-BLUR tape: net +$10.99,
# ZERO strangles (every recovering dip spared). The thresholds are deliberately
# conservative — catching every grinder is impossible without strangling a
# recoverer at these loss depths, so they catch only the cleanest grinds. Set
# monotonic_grind_cut_enabled = true to enable (only after live observation).
monotonic_grind_cut_enabled = true
monotonic_grind_near_trough_band_pct = 0.05
monotonic_grind_sustained_ticks = 24
monotonic_grind_max_recovery_ratio = 0.20
monotonic_grind_min_loss_pct = 0.30
# H1 (Neutrality + Exit-System Fix, 2026-05-30) — near-certain-loser carve-out.
# When p_win is at/below this, the structural-invalidation guard above YIELDS so
# the force-close fires and a clear bleeder is CUT instead of held until it stops
# out. Scoped strictly to this band (positions with higher p_win keep the guard);
# the -3% hard stop, loser timeout, SENTINEL tiers and 2.5% safety stop are
# unchanged, and healthy positions are never aggressively tightened. Must be
# <= p_win_force_close (0.15) to take effect. Set to 0.0 to disable the carve-out.
near_certain_loser_p_win = 0.10
# PF/LC Top-15 Problem 2.3 — age-aware near-certain-loser band. When enabled,
# the carve-out yields at near_certain_loser_p_win_old once the trade is older
# than age_threshold_to_raise_p_win_seconds (so an aged near-certain loser in
# the band is cut), and at near_certain_loser_p_win_young when still young. Both
# must stay <= p_win_force_close (0.15). Default false (the single
# near_certain_loser_p_win above is used); offline-validate before enabling.
winprob_age_aware_band_enabled = false
near_certain_loser_p_win_young = 0.10
near_certain_loser_p_win_old = 0.13
age_threshold_to_raise_p_win_seconds = 600.0
xray_drop_threshold = 0.40
regime_inversion_confidence_threshold = 0.60

# Absolute-PnL-depth penalty on Bayesian p_win update. Catches slow bleeders
# whose tick-over-tick deepening stays <1 ATR (so the ATR-relative penalty
# never fires). At |pnl| > 1.5% a mild 0.90 multiplier applies per tick the
# loss deepens; at |pnl| > 3.0% a strong 0.70 multiplier applies.
p_win_abs_depth_threshold_pct = 1.5
p_win_abs_depth_strong_pct = 3.0
p_win_abs_depth_penalty = 0.90
p_win_abs_depth_strong_penalty = 0.70

# PF/LC Top-15 Problem 3.1 — win-probability over-cut smoothing (the biggest
# controllable exit lever). Master switch off by default (behaviour unchanged).
# When true: the regime penalty applies only after a SUSTAINED mismatch
# (p_win_regime_penalty_sustained_ticks consecutive ticks), so a single 10s
# regime flicker no longer halves p_win; and a recovery guard holds the
# force-close while the trade is within p_win_recovery_guard_be_band_pct of
# breakeven AND making a new local high over p_win_recovery_guard_n_ticks ticks
# (unless there is real structural invalidation). Offline-validate before
# enabling. Do not remove the exit; this only smooths it.
smooth_p_win_enabled = false
p_win_regime_edge_trigger_enabled = true
p_win_regime_penalty_sustained_ticks = 3
p_win_recovery_guard_enabled = true
p_win_recovery_guard_be_band_pct = 0.5
p_win_recovery_guard_n_ticks = 3

# Per-class grace window (seconds before Time-Decay can act on a new loser).
# Slow bleeders (dead/low) act sooner — the whole point of the fix.
# Fast movers get more settling room so normal bar noise doesn't force exit.
[time_decay.grace_seconds_by_class]
dead = 30
low = 45
medium = 120
high = 180
extreme = 240

# Per-class ATR room multiplier (Model 2 — base atr_room = atr × mult).
# Dead coins stay tight (1.0×); extreme coins get 3.0× so huge-ATR swings
# don't trigger premature exits. `min_allowed_loss_pct = 0.15%` floor still
# applies post-combine so SL never goes below floor.
[time_decay.atr_room_multiplier_by_class]
dead = 1.0
low = 1.2
medium = 2.0
high = 2.5
extreme = 3.0


# ─── Layer 1 restructure Phase 1: observability ─────────────────────
# Standardized log-tag and cycle-tracker knobs. The defaults match
# blueprint Section 14 — 100-cycle in-memory history (≈8h at 5-min
# cadence), hourly flush to cycle_metrics, tick markers at INFO.
[observability]
cycle_tracker_history = 100
cycle_metrics_flush_seconds = 3600
log_tick_done_at_info = true

# System 1 (observability) — complete Call-A and Call-B brain prompt-and-
# response capture. capture_brain_calls is the centralized gate (the legacy
# data/stage2_dumps/.enabled sentinel file remains an optional live override).
# Each brain call writes one JSON record (full prompt, system prompt, response,
# call type, call id, decision id, timestamp) to capture_dir. The hourly
# cleanup worker prunes capture_dir/*.json older than capture_retention_days
# and caps the directory at capture_max_files. Dedicated files only — never the
# trading database or a protected table.
capture_brain_calls = true
capture_dir = "data/stage2_dumps"
capture_retention_days = 7
capture_max_files = 5000

# System 2 (observability) — per-second open-trade price path logger. A
# standalone background task samples each open trade's price about once per
# second by reading the already-running in-memory WebSocket quote cache (zero
# new exchange API calls), buffers in memory, and batch-flushes to the
# dedicated rotated price_path.log so the exit calibration can replay
# arm/lock/trail settings against the real intrabar price path. A WS quote
# older than price_path_ws_max_age_seconds is treated as a gap, not a point.
# price_path_rotation/retention are reserved for a future explicit-sink
# override; the routed price_path.log inherits the global 10 MB / 7 days.
price_path_logging_enabled = true
price_path_resolution_seconds = 1.0
price_path_flush_seconds = 30
price_path_ws_max_age_seconds = 5.0
price_path_rotation = "10 MB"
price_path_retention = "7 days"
price_path_filename = "price_path.log"

# ─── Phase 2 (post-Layer-1 fix): LayerManager safety knobs ────────────
# lm_attach_deadline_sec — hard deadline (seconds since OrderService
#   init) before the gate flips to fail-close for ALL purposes when
#   layer_manager is still None. Layer 4 close/SL normally bypass during
#   the bootstrap window so a watchdog close can still execute, but
#   exceeding the deadline implies attachment failure (LayerManager
#   never constructed) — at that point even Layer 4 cannot be allowed.
#   Default 60 s comfortably covers the observed boot ordering window
#   (≤ 5 s in production).
# state_sync_interval_sec — disk/memory layer state sync heartbeat
#   cadence. Every interval the LayerManager reads data/layer_state.json
#   and compares to layer_active in memory; a mismatch triggers a
#   recovery action (see [layer_manager.state_sync] below). Default 60 s
#   — fine for catching drift within one Strategy/Scanner cycle.
# state_sync.on_drift_action — Phase 11 (dead-workers fix). What the
#   heartbeat does when disk and memory disagree.
#     "rewrite_disk" (default, post-fix): memory wins. Re-persist
#       memory to disk; emit LAYER_STATE_DRIFT_RECOVERED. Correct
#       semantics — persist failures should be RECOVERED by re-
#       attempting persist, not by undoing the in-memory state.
#     "reload_memory" (legacy, pre-fix): disk wins. Overwrite memory
#       from disk; emit LAYER_STATE_DRIFT. This is the exact behaviour
#       that produced the Layer 3 toggle revert regression observed
#       on 2026-04-27 — only set this for emergency rollback.
[layer_manager]
lm_attach_deadline_sec = 60.0
state_sync_interval_sec = 60.0

[layer_manager.state_sync]
on_drift_action = "rewrite_disk"

# ── SignalGenerator multi-source classification (Phase 1 output-quality) ─────
# Pre-fix, _evaluate_signal() used sentiment as a HARD gate: every BUY/SELL
# rule required abs(sentiment) > 0.2. With sentiment=0.0 in 97.9% of coins
# (Reddit disabled, Finnhub no altcoin coverage, aggregator.py:165 zero-coverage
# rule), all signals fell through to NEUTRAL by design.
# Post-fix evaluator computes a weighted direction_score across 4 components
# (sentiment, F&G contrarian, funding rate, OI change). Each component is
# "active" only if abs(score) >= its min threshold; INACTIVE components are
# dropped (don't pull toward NEUTRAL). A coin with sentiment=0.0 but F&G=15
# and funding=-0.012 will now correctly classify BUY via F&G+funding alone.
# Definitive-fix Phase 5 (2026-04-28) — calibration to break the 100 %
# NEUTRAL distribution observed in forensic C.2.4. The multi-source
# weighted classifier (signal_generator._evaluate_signal) and the
# Phase-29 confidence gate are correct architecturally; the issue is
# threshold tightness vs. the actual input availability:
#   - funding_min_active 0.20 → 0.10 — funding rates rarely have
#     |rate|/0.005 ≥ 0.20 (i.e. |rate| ≥ 0.001 = 0.1%) in normal
#     markets; 0.10 (= |rate| ≥ 0.05%) admits more coins to the
#     weighted sum.
#   - oi_min_active 0.20 → 0.10 — same rationale for OI delta.
#   - buy_threshold 0.25 → 0.18 — the lowered "active" thresholds bring
#     more components into the renormalised sum, but a 0.25 gate still
#     demands strong agreement; 0.18 is a more realistic gate given the
#     typical direction-score magnitude observed in forensic SIG_CLASSIFY
#     lines (most BUY-leaning coins land in 0.18-0.30 range).
# strong_threshold stays 0.55 so the STRONG label keeps its meaning;
# only the BUY/SELL gate relaxes.
[signal_generator.multi_source]
sentiment_min_active = 0.05
fg_min_active = 0.10
funding_min_active = 0.05
oi_min_active = 0.05
fg_weight = 0.25
funding_weight = 0.20
oi_weight = 0.15
strong_threshold = 0.55
buy_threshold = 0.05
fg_normalize_range = 30.0
funding_normalize = 0.005
oi_normalize_pct = 5.0
# Issue 1 (2026-06-08) — Fear-and-Greed direction neutrality. The contrarian
# F&G term ((50 - fg)/fg_normalize_range, large positive on extreme fear) was
# pinning the classifier to ~100% buy (the structural root of the one-directional
# contrarian-long book), contradicting the prompt-layer F&G-neutral work. When
# true, F&G contributes NOTHING to DIRECTION (direction comes from the coin's own
# funding/OI/sentiment); F&G still informs the confidence magnitude. NEUTRALITY,
# not a flip. Offline replay: 100% buy -> 32% buy / 51% sell / 17% neutral.
# false = restore the prior contrarian-buy behaviour (off-switch).
fg_direction_neutral = false
# Fix 1 (price-conditioned OI, 2026-06-10) — the OI direction component is
# conditioned on the same-window price move. Rising OI on a FALLING price is
# shorts piling in (BEARISH continuation), not longs accumulating (bullish); the
# pre-fix code mapped any rising OI to bullish, manufacturing buy signals on
# coins grinding down (the proven RUNE wrong-side root). The sign is inverted
# only when OI change and price change have OPPOSITE signs; magnitude is
# preserved. This is a formula correction, not a short bias — the result is
# two-sided per each coin's own price.
# oi_price_window_hours: the price window matched to the OI change window (both
#   ~24h today, so the two halves of the condition describe the same move).
# oi_price_dead_band_pct: minimum absolute price move (percent) required before
#   the conditioning inverts; 0.0 = invert on any opposite-sign move.
oi_price_window_hours = 24.0
oi_price_dead_band_pct = 0.0
# Fix 2 (fresh signal inputs, 2026-06-10) — the signal read ONLY the ~24h OI
# delta, which on alt coins is often saturated (KAT pinned at +126% for many
# cycles) and barely moves intra-session, so the signal froze for half an hour
# at a time while the market turned. This blends a fresh SHORT OI window (the
# repo already computes change_1h_pct) with the 24h confirmation. The blend is
# on the per-window PRICE-CONDITIONED, NORMALIZED scores (not raw percents), so
# the saturated 24h delta does not drown the fresh short window — and the signal
# moves with the recent market. oi_short_window_hours also sets the matching
# price-change window read from 5-minute klines. To replay the prior 24h-only
# behaviour (A/B baseline / revert), set oi_blend_weight_short = 0.0 and
# oi_blend_weight_long = 1.0. Funding stays the live instantaneous rate.
oi_short_window_hours = 1.0
oi_blend_weight_short = 0.6
oi_blend_weight_long = 0.0
funding_use_instantaneous = true
# Five-Fix Follow-Up — Fix 2 (2026-06-10): the 15-minute window joins the 1h
# window as the DIRECTIONAL DRIVERS (operator-approved weights 15m=0.4,
# 1h=0.6); the 24h read becomes CONTEXT-ONLY (weight 0.0 — still computed,
# shown to the brain as oi_change_24h_pct and logged, just not steering
# direction). Each window is price-conditioned against its own matching kline
# window before the blend, so the Fix-1 pairing measures both halves of the
# bullish-or-bearish condition over the SAME move. If neither short window has
# usable data the blend falls back to the 24h conditioned score at full
# strength. Revert levers: 15m=0.0/short=0.7/long=0.3 restores the previous
# 1h+24h blend; 15m=0.0/short=0.0/long=1.0 restores the original 24h-only read.
oi_15m_window_hours = 0.25
oi_blend_weight_15m = 0.4

# ── CoinPackage validator (Phase 5 output-quality) ──────────────────
# Validates each CoinPackage produced by ScannerWorker before it lands
# in layer_manager._coin_packages (which Stage 2 reads). Packages with
# completeness < fail_below are QUARANTINED (not included). warn_below
# packages still flow but are flagged in the per-package log.
# Score formula: (sum_required + 0.5*sum_optional) / (count_required +
# 0.5*count_optional). See src/core/coin_package_validator.py docstring
# for the full rule list.
[coin_package_validator]
fail_below = 0.50
warn_below = 0.85
staleness_fail_seconds = 300.0

# ── Entry Volume-Ratio Gate (2026-07-15, Phase 1 — enforcing) ───────
# A 371-trade VM analysis (2026-07-11..14) found volume_ratio at entry
# (M5 current volume vs SMA) separates winners from losers: vr >= 0.4
# kept +$49.31 net vs dropped -$71.17 on the baseline window, and the
# split survived 5 robustness checks (per-day, leave-one-symbol-out,
# within-symbol, threshold sensitivity, chronological halves). See
# IMPLEMENT_ENTRY_VOLUME_GATE.md for the full evidence + phased plan.
#
# OPERATOR DECISION (2026-07-15): enforcing on first deploy, skipping the
# plan's original live-counterfactual gate (observe >=3 days / >=200
# trades before enforcing). This trades the extra safety margin for
# speed — accepted risk is that the split is a one-window artifact.
# min_volume_ratio started conservative (0.30, keeps ~57% of trades on
# the baseline window) rather than the stronger 0.40 split, to reduce
# the blast radius of that risk. Revert instantly by setting mode back
# to "observe" (config-only, no redeploy needed beyond a worker restart).
# min_volume_ratio = 0 is an instant kill switch even in enforce mode.
[entry_volume_gate]
enabled = true
mode = "enforce"
min_volume_ratio = 0.30

# ── ATR gate (2026-07-16) — same section, independent knobs ─────────
# A 342-trade analysis (2026-07-13..16, split at the R:R fix deploy)
# found entry ATR% is a strong, monotonic selector: entry_atr_pct < 0.20%
# lost money as a cohort (win% 35-47%, cum PnL negative) across BOTH the
# pre- and post-fix windows; entry_atr_pct >= 0.20% carried the entire
# post-fix profit (66-68% win, +13 to +15% cum on this window). See
# IMPLEMENT_ENTRY_QUALITY_SELECTIVITY.md §1a for the full evidence and
# the honest caveat: no symbol had enough trades on both sides of the
# threshold for a within-symbol robustness check, so part of the effect
# may be "which coins are moving" rather than pure entry timing.
#
# OPERATOR DECISION (2026-07-16): enforcing on first deploy, same
# trade-off as the volume gate above — skips the plan's observe-first
# staging in exchange for speed. min_atr_pct started at the conservative
# end of the evidence (0.20, not the stronger 0.25 split) to reduce
# blast radius. Revert instantly via atr_mode = "observe" (config-only,
# worker restart only). min_atr_pct = 0 is an instant kill switch.
atr_enabled = true
atr_mode = "enforce"
min_atr_pct = 0.20

# ── Recent-loss gate (2026-07-17) — same section, independent knobs ──
# Forensic trace of GWEIUSDT's post-ATR-gate trades found the system
# already has TWO mechanisms meant to prevent same-direction repeat
# losses (a brain-prompt RECENT_LOSER_COOLDOWN rule requiring "fresh,
# independent structure" before re-entering a just-closed loser, and a
# scanner qualitative blocker at recent_failure_blocker_hours=1) — and
# neither stopped 3 consecutive GWEIUSDT shorts closing at -1.76%,
# -1.90%, -1.94% within 59 minutes of each other. One surviving thesis
# reads "Despite RECENT_LOSER_COOLDOWN, the setup quality is B...". The
# prompt rule is advisory (the free-tier model rationalized past it);
# the scanner blocker is upstream and can be routed around. This gate
# is last-mile: same execution point as the volume/ATR gates above,
# after every other check has already passed, and it counts DB-verified
# losses instead of trusting the model's self-assessed "setup quality".
# See IMPLEMENT_ENTRY_QUALITY_SELECTIVITY.md §8 for the full trace.
#
# OPERATOR DECISION (2026-07-17): enforcing on first deploy, same
# trade-off as the other two gates. lookback_hours=1.0 and
# max_recent_losses=1 exactly match the EXISTING advisory rule's
# stated intent ("closed at a loss within 1h — do NOT re-enter") — this
# is not a new invented threshold, it is that rule finally enforced in
# code instead of hoped for in the prompt. Revert instantly via
# recent_loss_mode = "observe". max_recent_losses = 0 is a kill switch.
recent_loss_enabled = true
recent_loss_mode = "enforce"
recent_loss_lookback_hours = 1.0
max_recent_losses = 1

# ── Worker liveness watchdog (Phase 11 dead-workers fix) ────────────
# Watchdog probes the per-worker liveness tracker every interval and
# emits WORKER_NEVER_TICKED / WORKER_TICK_OVERDUE warnings when a
# worker has registered but produced no first tick within the grace
# window, or has gone quiet for overdue_multiplier × expected_interval
# after its first tick. WORKER_LIVENESS_HEARTBEAT INFO log fires every
# tick regardless so workers.log has a continuous trail.
#
# Cycle-gate aware: cycle_gated workers (1B/1C/1D) that haven't ticked
# while LayerManager.is_cycle_active() is False are NOT alarmed —
# they're intentionally silent. Without this awareness the watchdog
# would false-alarm on the 5 cycle_gated workers every L3=OFF window.
[worker_liveness]
watchdog_interval_sec = 30
first_tick_grace_sec = 90
overdue_multiplier = 2.0
alert_rate_limit_sec = 3600

