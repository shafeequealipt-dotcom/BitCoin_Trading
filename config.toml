[regime]
# Market regime detector
#
# Branch thresholds calibrated to close the ELSE = RANGING fallback gap.
# Pre-tune the explicit branches absorbed under 10% of emissions; 73.9%
# fell through `else: RANGING conf=0.40` (regime.py:153-156) producing an
# uninformative default label with 12.5% accuracy. Empirical 30-min
# kline analysis on 96 stratified samples documented in
# dev_notes/regime_investigation/q2_synthesis.md.
#
# trending_adx_threshold lowered to 20 — catches the [20, 25) transition
# band where ADX shows nascent directional pressure. With DIs aligned and
# choppiness < 45 the coin is meaningfully trending despite ADX below the
# old strict 25 cut.
# ranging_choppiness_threshold lowered to 50 — strict ranging at chop > 60
# almost never fired in crypto (3.1% of ranging emissions). 50 matches
# crypto-norm flat-market signature.
# volatile_atr_percentile = 70 — Issue #9 fix (2026-05-27) made atr_percentile a
# TRUE rolling percentile (rank of the current NATR vs the fetched 200 H1
# window, bounded 0-100), so 70 now means "above the 70th percentile of recent
# volatility". Previously it was `atr_percentile = natr * 100`, a fixed absolute
# level (live max reached ~641) — no longer the case. See src/strategies/regime.py.
# dead_adx_threshold lowered to 12 — tighter dead criteria so weakly-
# trending dead-volume coins fall to trending branches, not dead.
detection_interval_seconds = 600
primary_symbol = "BTCUSDT"
trending_adx_threshold = 20
ranging_adx_threshold = 20
ranging_choppiness_threshold = 50
# Issue #6 tiling fix (2026-05-27): explicit ceiling for a CLEAN trend.
# Coins with ADX trend strength but choppiness at/above this are no longer
# dumped into a fabricated RANGING/0.40 dead-zone; they are classified by
# their dominant metric with a computed confidence (see src/strategies/regime.py).
trending_choppiness_max = 45
volatile_atr_percentile = 70
# Per-coin-authority Phase 0a (2026-05-29): VOLATILE volume trigger, was the
# hardcoded literal 2.0 in regime.py. Now evaluated AFTER trend/range/dead
# structure, so a low-ADX high-choppiness coin is RANGING (not VOLATILE) even
# if its volume spikes; this only catches genuinely volume-driven volatility.
volatile_volume_ratio = 2.0
dead_adx_threshold = 12
dead_volume_ratio = 0.5
# Phase 3 (output-quality): per-symbol confirm-N-readings hysteresis.
# Pre-fix this was hardcoded at 2 in src/strategies/regime.py:185.
# Higher → more sticky regimes (fewer false flips), lower → more
# responsive (potentially flapping). Validated >= 1 at config-load.
hysteresis_count = 2
# Per-coin-authority Phase 5 (2026-05-29): breadth RISK/SIZING brake — the ONLY
# market-wide signal that survives the global-regime removal. Derived from the
# PER-COIN regime distribution (not a single coin); shrinks position size when
# the universe is directionally lopsided (high correlation -> systemic risk).
# SIZING ONLY — never direction, never strategy roster. Set breadth_brake_enabled
# = false to roll back to no brake. Graduated: mult = 1.0 while the dominant
# trending-direction share <= start, then linearly down to floor at full
# one-sidedness. Conservative defaults.
breadth_brake_enabled = true
# Issue 2.4 (2026-06-07): the throttle fired but barely bit (mult ~0.96, a 4%
# cut, at 0.68 lopsided) because start was high and floor shallow. Calibrated to
# genuinely reduce size as breadth becomes one-sided: engage at 0.60 (was 0.65)
# and cut to 0.40 at full one-sidedness (was 0.50). At 0.68 lopsided this now
# cuts ~12% (was ~4%); at 0.90, ~45%; at 1.0, 60%. SIZING ONLY, never direction.
breadth_brake_start = 0.60
breadth_brake_floor = 0.40
breadth_brake_min_coins = 10

[strategy_engine]
# 4-layer strategy execution engine — AGGRESSIVE
scan_interval_seconds = 45
min_score_threshold = 0
# Candidate-Block Data Integrity Fix — Issue 2 (2026-06-09) — Layer 1 input
# gates, centralized (were hardcoded in the worker). A symbol whose newest
# kline is older than kline_max_age_seconds is skipped before TA (logged
# per-coin as STRAT_SKIP_STALE); a symbol with fewer than min_kline_count
# candles is dropped from the Layer 1 set (now logged per-coin as
# STRAT_SKIP_KLINE_COUNT instead of silently). Same defaults as before.
kline_max_age_seconds = 300.0
min_kline_count = 50
# Candidate-Block Data Integrity Fix — Issue 5 (2026-06-09) — TradeScorer grade
# composition, centralized (cutoffs were hardcoded). grade_threshold_* are the
# total cutoffs for A+/A/B/C (same defaults). grade_quality_floor is the quality
# sub-score (out of 20) below which a setup is low-quality — it drives the
# always-on "quality LOW" annotation in the candidate block and, when the cap is
# enabled, the grade cap. grade_quality_cap_enabled (default false) is a
# behaviour-changing lever: when true a low-quality setup cannot carry a grade
# above grade_quality_cap_max_grade (the canonical grade is lowered, which can
# reach fund-manager sizing). Set grade_quality_floor = 0 to disable both.
grade_threshold_a_plus = 80
grade_threshold_a = 68
grade_threshold_b = 56
grade_threshold_c = 45
grade_quality_floor = 10.0
grade_quality_cap_enabled = false
grade_quality_cap_max_grade = "B"
min_ensemble_agreement = 2.5
max_ensemble_opposition = 2.5
# Layer 1 Defect 6 (2026-05-21) — STRONG-consensus thresholds. Must
# compose correctly with the GOOD thresholds above: STRONG agreement
# floor >= GOOD floor AND STRONG opposition ceiling <= GOOD ceiling
# (STRONG is strictly STRICTER than GOOD). The EnsembleVoter __init__
# self-check logs BOOT_ENSEMBLE_THRESHOLDS_OK when the composition is
# sane, and AUTO-CORRECTS (clamps STRONG to be at least as strict as
# GOOD, logs BOOT_ENSEMBLE_THRESHOLDS_AUTOCORRECTED) if it is ever
# re-inverted (Issue #18/E15, 2026-05-28). Under current config
# (GOOD 2.5/2.5) STRONG 4.0/1.5 composes correctly on both dimensions.
min_ensemble_agreement_strong = 4.0
max_ensemble_opposition_strong = 1.5
# Layer 1 Defect 1 (2026-05-21) — when true (default per operator
# decision), StrategyRegistry.get_active_for_regime filters
# strategies via REGIME_ACTIVE_CATEGORIES (regime_types.py:18-38).
# Set false to restore the pre-Defect-1 uniform-strategy behavior
# (every enabled strategy votes regardless of regime) as an
# emergency rollback. Per-call REGISTRY_REGIME_FILTER log line
# records the active count.
strategy_regime_filter_enabled = true
max_setups_to_brain = 10
max_brain_calls_per_hour = 30
# Definitive-fix Phase 12 (2026-04-28) — ensemble voter diagnostics
# + togglable single-strategy cap. Forensic D.1.6 captured AAVEUSDT
# consensus flapping STRONG→GOOD→WEAK→STRONG across 6 cycles. The
# vote-trace log is the investigation telemetry; the cap is a
# safeguard that limits any single strategy's contribution to a
# fraction of ``agreeing`` so STRONG always requires multiple
# independent strategies.
#   vote_trace_enabled: emit STRAT_VOTE_TRACE per STRONG coin per
#     cycle. Cheap, togglable to silence in production once the flap
#     is diagnosed.
#   single_strategy_max_share: caps how much of one side's weighted
#     vote total a single strategy may supply. 1.0 disables the cap;
#     0.4 means no single strategy can supply more than 40% of the
#     agreeing total, so a STRONG consensus requires breadth (~3
#     strategies) rather than one loud voter.
#   E28 (2026-05-28): ENABLED at 0.4 (completes #19). Safe vs current
#     balanced STRONGs (each voter is well under the per-voter ceiling);
#     minimal live effect while regime_weighting_enabled is false (a
#     single equal-weight voter is already far below the STRONG floor),
#     its real value is robustness for when weighting is on. The cap
#     logs ENSEMBLE_DOMINANCE_CAP_BOUND whenever it clamps a voter.
vote_trace_enabled = true
single_strategy_max_share = 0.4
# P2 entry-direction fix (2026-06-04) — two-sided ensemble vote. The strategy
# vote() methods are direction-conditional confirmers: asked the originator's
# direction they return that direction or NEUTRAL, never the opposite. So the
# opposing side tallies zero even when strong opposing signals exist (a bearish
# supertrend stays NEUTRAL when asked about a Buy). When true, the ensemble runs
# a SECOND poll with the opposite direction and surfaces the honest opposing
# weighted sum to the brain so it weighs a real Buy-vs-Sell contest — the brain
# decides direction from the honest evidence, not a one-sided count. Does not
# change the consensus label, sizing, or the vote cache. false = legacy.
ensemble_two_sided_vote = true
# Issue #19 fix (2026-05-27): enable the data-derived ensemble weighting LIVE.
# Previously every strategy counted equally at 1.0, so the consensus the brain
# reads had no track-record intelligence. The StrategyWeightDeriver weights each
# (strategy, regime) cell by its realized PnL, and is GRADUAL BY DESIGN: a cell
# stays at equal weight (1.0) until it has regime_weighting_cold_start_n (20)
# supporting trades, the factor is EMA-smoothed across refreshes, and is bounded
# to [regime_weighting_floor, regime_weighting_ceil] = [0.3, 3.0]. So the
# immediate effect is small and grows as track record accumulates. Observe via
# RW_REFRESH_OK (factor_range) and STRAT_VOTE_TRACE_SHADOW (would_change).
# ROLLBACK: set this back to false and restart.
regime_weighting_enabled = true

