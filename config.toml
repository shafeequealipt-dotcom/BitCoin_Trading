# =============================================================================
# Trading Intelligence MCP — Master Configuration
# =============================================================================
# All settings for the entire system. Env vars override values here.
# Copy .env.example → .env and fill in your API keys.
# =============================================================================

[general]
# Trading mode:
#   "shadow"     — Shadow virtual exchange (default; localhost:9090 paper exec)
#   "bybit_demo" — Bybit demo trading (api-demo.bybit.com paper-money exec)
#   "bybit"      — Bybit mainnet (live; reserved for future live-trading project)
#   "paper"      — Bybit testnet via pybit (legacy; superseded by bybit_demo)
#   "live"       — Real funds (requires explicit confirmation)
#
# T6-1 / Phase5 F-2 fix (six-tier-fixes 2026-05-11) — aligned the
# config-default mode with the persisted runtime state in
# transformer_state (mode=bybit_demo since 2026-05-08). The previous
# stale "shadow" default did not affect runtime (the DB-persisted mode
# wins via transformer_state.id=1) but was a recurring operator-
# confusion source on cold-start audit reads.
mode = "shadow"
# Shadow API URL (only used when mode = "shadow")
shadow_api_url = "http://127.0.0.1:9090"
# Timezone for display (internal always UTC)
timezone = "UTC"
# How verbose: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"
# Directory for log files (relative to project root)
log_dir = "data/logs"

[bybit_demo]
# Bybit demo (paper money) execution adapter. Activate by setting
# [general] mode = "bybit_demo" and providing demo API credentials in
# .env (BYBIT_DEMO_API_KEY / BYBIT_DEMO_API_SECRET). Switching is
# operator-driven via Telegram with a process restart between exchanges.
enabled = true
base_url = "https://api-demo.bybit.com"
# Bybit recv-window in milliseconds.
recv_window = 5000
# Per-request timeout (seconds).
timeout_seconds = 10.0
# Retry budget for transient transport / 5xx / 429 errors.
retry_attempts = 5
# Base for exponential backoff (0.2 * 2^(n-1)).
retry_base_delay_seconds = 0.2
# ── PnL-truth provenance (2026-06-07) ──
# How the WS self-close path resolves the authoritative close PnL.
#   "ws_exec" — identity-match the exchange closed-pnl row by the close
#               order_id/qty (the TRUTH path; activates the already-wired
#               identity resolver). This is the fix default.
#   "gated"   — match on price+qty only.
#   "legacy"  — single-shot rows[0] (rollback only; the stale-row source that
#               booked the gross fallback and produced the sign-flip).
close_pnl_source = "ws_exec"
# When the exchange closed-pnl row is not yet indexed at book time, book the WS
# net tagged provisional (never a final win) and reconcile when it arrives.
close_pnl_provisional = true
close_pnl_reconcile = true
close_pnl_reconcile_max_attempts = 10
close_pnl_reconcile_interval_s = 1.0
close_pnl_reconcile_total_budget_s = 30.0
# Phase 1 residual fix (2026-06-08) — reconcile exit-plausibility gate. The
# reconcile channel bypasses on_trade_closed's staleness gate, and the resolver's
# qty gate is inert once the trade state is popped, so a stale same-symbol
# closed-pnl row (qty-only match) could be booked as a phantom (proven live:
# NEAR exit 2.3379 vs the trade's ~2.07 band => a -$75.83 loss booked as +$18.52).
# A reconcile is REJECTED (provisional kept, retry continues) when the resolved
# exchange exit price diverges from the provisional close's exit by more than this
# percent. Set generous enough to allow real slippage + fee-driven sign flips
# (same exit), tight enough to catch a wrong-trade row. 0 disables the gate.
close_pnl_reconcile_max_exit_divergence_pct = 3.0

[bybit]
# Bybit mainnet for REAL market data. Orders routed via Transformer to Shadow (paper).
testnet = false
# Fallback symbols (used when bulk ticker API fails). Scanner dynamically
# selects top 20 by score from all Bybit USDT perps on each scan cycle.
default_symbols = [
    "BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT", "DOGEUSDT",
    "ADAUSDT", "AVAXUSDT", "LINKUSDT", "SUIUSDT", "1000PEPEUSDT",
    "WIFUSDT", "HYPEUSDT", "AAVEUSDT", "NEARUSDT", "APTUSDT",
    "ARBUSDT", "OPUSDT", "LTCUSDT", "BCHUSDT", "TONUSDT",
]
# Rate limit: max requests per second to Bybit REST API
rate_limit_per_second = 10
# WebSocket ping interval in seconds
ws_ping_interval = 20
# Reconnect delay on WS disconnect (seconds)
ws_reconnect_delay = 5
# Order receive window in milliseconds
recv_window = 5000

[finnhub]
# Enable Finnhub news + calendar integration
enabled = false
# Rate limit: Finnhub free tier allows 60 calls/min
rate_limit_per_minute = 60
# Categories to fetch: general, forex, crypto, merger
news_categories = ["crypto", "general"]
# Max articles to fetch per poll
max_articles_per_fetch = 50

[reddit]
# Enable Reddit sentiment analysis via PRAW
enabled = false
# Subreddits to monitor for crypto sentiment
subreddits = ["cryptocurrency", "bitcoin", "ethtrader", "CryptoMarkets", "solana"]
# Max posts to fetch per subreddit per poll
max_posts_per_sub = 25
# Minimum score threshold to consider a post relevant
min_score = 10
# Rate limit: Reddit allows ~60 requests/min with OAuth
rate_limit_per_minute = 60

[ta]
# Technical Analysis engine settings.
#
# confidence_ema_alpha controls the EMA smoothing applied to
# overall.confidence in TAEngine._compute_overall_signal. Pre-fix the
# raw `dominant_indicators / total_indicators` ratio swung 0.14 on a
# single indicator flip (RSI crossing 50, MACD histogram zero-cross),
# which propagated into the TradeScorer Context block (threshold-cross
# at 0.6 → 10 ↔ 0 swing) and produced cycle-to-cycle Context flapping
# on identical structural inputs.
#
# Smoothed: confidence = alpha * raw + (1 - alpha) * prev_confidence
# alpha = 0.4 keeps the response within ~3 cycles for genuine state
# changes while halving cycle-to-cycle variance on indicator noise.
# Set 1.0 to disable smoothing (legacy behaviour).
confidence_ema_alpha = 0.4

# Item 4 (entry-gaps investigation 2026-05-26): compute volume_sma_ratio on the
# last CLOSED candle, excluding the still-forming newest bucket whose partial
# volume biases the ratio low. Default false keeps legacy behaviour. See
# ENTRY_GAPS_AND_TIMEFRAME_INVESTIGATION_FINDINGS.md.
volume_ratio_use_closed_candle = true

[altdata]
# Enable alternative data collection (Fear & Greed, funding rates, etc.)
enabled = true
# Fear & Greed index poll interval in seconds (API updates ~daily)
fear_greed_interval = 3600
# Funding rate poll interval in seconds
funding_rate_interval = 300
# Open interest poll interval in seconds
open_interest_interval = 600
# CoinGecko rate limit (free tier: 10-30 calls/min)
coingecko_rate_limit_per_minute = 10

[database]
# SQLite database path (relative to project root)
path = "data/trading.db"
# WAL mode for concurrent reads during writes
wal_mode = true
# Connection pool size (for future PostgreSQL migration)
pool_size = 5
# Query timeout in seconds
query_timeout = 30
# Auto-vacuum interval in hours
vacuum_interval = 24
# Phase 1 (D-3 fix) — chunk size for MarketRepository.save_klines.
# A single executemany over the full per-(symbol, timeframe) batch held
# the DatabaseManager lock for 12-20 s during heavy ticks, queueing every
# other worker behind it. Chunking + yielding the loop between chunks
# eliminates that contention without changing total wall-clock work.
kline_save_chunk_size = 500
# Phase 1 (D-3 fix) — WAL checkpoint scheduler cadence (in kline_worker
# ticks). PASSIVE checkpoints never block, so it's safe to schedule
# them often. The historical 100 MiB pinned -wal file disappeared once
# we stopped relying on opportunistic auto-checkpoint + hourly cleanup.
#
# 2026-04-29 update — set to 1 (every kline tick = every 5 min) after
# observing the WAL re-grow to 100 MiB on a fresh process within 25 min:
# kline_worker fires every 5 min (interval=300s), so cadence=50 deferred
# the first scheduled checkpoint by 250 min, and cleanup_worker's hourly
# checkpoint hadn't fired yet either. With ubiquitous readers
# (position_watchdog every 10s, profit_sniper every 5s, 19 workers
# total), PASSIVE checkpoints typically come back busy=non-zero, so
# reclamation depends on the busy-escalation chain (3 consecutive busy
# → TRUNCATE). At cadence=50 that's 200 ticks = 16+ hours between
# TRUNCATE escalations. At cadence=1, the same chain reclaims at most
# every 15 min. PASSIVE itself does partial reclaim each call.
wal_checkpoint_every_n_kline_ticks = 1
# Phase 1 (D-3 fix) — escalate to TRUNCATE if PASSIVE checkpoints come
# back busy this many times in a row. TRUNCATE briefly blocks writers
# but fully reclaims WAL space when readers consistently pin snapshots.
wal_checkpoint_truncate_after_busy_count = 3
# Phase 1 (D-3 fix) — DB_LOCK_WAIT warn threshold (ms). Drop to 500 ms
# during verification to see finer-grained contention, then raise back.
db_lock_wait_threshold_ms = 1000
# Phase conn-pool/p3-9 (db-concurrency-refactor 2026-05-14) — selects the
# DatabaseManager concurrency engine. The only supported value is
# "reader_pool" (N reader connections + 1 writer connection). The
# historical "single_lock" engine was removed after 2 hours of stable
# production (99%+ lock-wait reduction, 100% cascade elimination); the
# code path is no longer present and the field is rejected by the
# settings validator. Setting retained for forward-compat with future
# per-domain engine selection. Override at runtime via the
# DATABASE_CONCURRENCY_MODEL env var.
concurrency_model = "reader_pool"
# Phase conn-pool/p3-1 — number of aiosqlite reader connections opened at
# boot under the "reader_pool" engine. The final value is chosen from the
# Phase 3.5 stress-test sweep (2 / 4 / 8 / 12). Default 4 is a placeholder.
reader_pool_size = 4

[workers]
# Enable background data collection workers
enabled = true
# Market data worker: OHLCV + ticker polling interval (seconds)
market_data_interval = 45
# News worker: Finnhub polling interval (seconds)
news_interval = 300
# Reddit worker: sentiment polling interval (seconds)
reddit_interval = 600
# Alt data worker: funding rates, OI, Fear & Greed interval (seconds)
altdata_interval = 300
# Health check interval: how often workers report status (seconds)
health_check_interval = 120
# Max consecutive failures before worker restarts
max_consecutive_failures = 5
# Worker restart delay (seconds)
restart_delay = 10

# ─────────────────────────────────────────────────────────────────────
# Sweet-spot scheduling — corrected Layer 1 architecture (Phase 1).
#
# The 7 data workers fire at these MM:SS offsets within every 5-minute
# window. Chain ordering is enforced (kline → structure → signal →
# regime → strategy → scanner) so each downstream worker reads warm
# upstream data. PriceWorker is continuous (no sweet spot needed).
# Bad MM:SS values or out-of-order chain → ConfigError at startup.
#
# Reference: LAYER1_CORRECTED_ARCHITECTURE_BLUEPRINT.md §8.
# ─────────────────────────────────────────────────────────────────────
[workers.sweet_spots]
window_minutes = 5
kline_worker = "0:30"
structure_worker = "0:45"
signal_worker = "1:00"
regime_worker = "1:15"
strategy_worker = "1:30"
scanner_worker = "4:00"

[workers.sweet_spots.altdata]
# Funding rates: MM:SS within window, between regime (1:15) and scanner (4:00).
funding_rates = "1:45"
# Open interest: every N minutes, independent of window.
open_interest_minutes = 5
# Five-Fix Follow-Up — Fix 2 (fresh OI, 2026-06-10): the exchange snapshot
# granularity the fetch asks for. The cadence above was already 5-minute, but
# the fetch requested "1h" snapshots, so every 5-minute fetch stored the same
# hourly plateau value and the brain's oi_change_pct froze identical across
# cycles (proven: ALGO stored 71256914.0 for ten straight 5-minute rows).
# "5min" makes each fetch a genuinely fresh snapshot. Allowed: 5min, 15min,
# 30min, 1h, 4h, 1d. Set "1h" to restore the prior behaviour.
open_interest_interval = "5min"
# Fear & Greed: every M minutes, hourly default.
fear_greed_minutes = 60

[brain]
# Claude Code CLI — no API key needed, no budget limit
# Uses existing Claude Max subscription ($0 per call)
enabled = true
use_claude_code = true
# Brain provider switch. Options:
#   "claude_code"    → OpenRouter (OpenAI-compatible) via ClaudeClient, model=
#                      the [brain] `model` key below (deepseek). The historical
#                      default; the "else" branch in workers/manager.py.
#   "glm_cloudflare" → GLM-5.2 via Cloudflare Workers AI (src/brain/glm_client.py)
#   "groq"           → Groq (OpenAI-compatible) via ClaudeClient, model=groq_model
#                      below. Key from GROQ_API_KEY env var.
# 2026-07-18: switched to "groq" after the OpenRouter account ran out of
# credits and halted trading for ~24h (every CALL_A got HTTP 402). Revert
# instantly by setting this back to "claude_code" (needs OpenRouter credit).
provider = "groq"
# Groq model chosen by live test (2026-07-18): llama-3.3-70b-versatile —
# clean strict-JSON (no chain-of-thought preamble like qwen), correct
# TP>=2x SL adherence, fastest latency, and the only strong model whose
# free-tier 12000 TPM fits the real ~9-10k-token CALL_A prompt (gpt-oss-120b
# is smarter but capped at 8000 TPM). Watch the ~1000 requests/day ceiling.
groq_model = "llama-3.3-70b-versatile"
# groq_max_tokens is RESERVED against Groq's 12000 TPM budget on every call
# (Groq counts input + max_tokens toward the per-minute token limit). The real
# CALL_A prompt is ~10.5k input tokens, so the original 4096 reservation pushed
# the request to ~14.5k and hit HTTP 413 "Request too large ... Limit 12000"
# (2026-07-18). llama-3.3-70b's actual CALL_A output is only ~300 tokens
# (measured in the pre-deploy test), so 1024 is ample for output AND leaves
# ~500 tokens of input headroom under the 12000 TPM ceiling. Free-tier note:
# this fits an isolated CALL_A; a CALL_A+CALL_B collision in the same ~few
# seconds can still transiently exceed TPM (the client retries). Groq Dev Tier
# removes the ceiling if the free tier proves too tight.
groq_max_tokens = 1024
groq_temperature = 0.3
glm_model = "@cf/zai-org/glm-5.2"
# GLM-5.2 is a reasoning model — hidden chain-of-thought consumes tokens
# before the final answer. max_tokens must cover both or content truncates
# empty. timeout is generous since reasoning models are slower than Claude.
glm_timeout_seconds = 240.0
glm_max_tokens = 8000
glm_temperature = 0.3
glm_max_retries = 2
# Item 2 (entry-gaps investigation 2026-05-26): append an expected-winner-
# magnitude advisory (MAG=HIGH/MED/LOW, from entry M5 volatility class) to each
# coin's volatility line in the strategist prompt. Advisory only; never gates or
# resizes. Default false. See ENTRY_GAPS_AND_TIMEFRAME_INVESTIGATION_FINDINGS.md.
entry_magnitude_advisory_enabled = true
# Issue 4 (CALL_A exploit/fetch, 2026-06-05) — strategy-evidence freshness.
# A coin's "Strategies: N fired" consensus read older than this many seconds is
# labelled STALE on the zero-fired line so the brain weighs a stale two-sided
# lean cautiously. About 1.2x the ~300s strategy cadence. Tuning starting point.
consensus_freshness_seconds = 360
# Issue 5 (CALL_A exploit/fetch, 2026-06-05) — exploitation breadth targets. The
# CALL_A prompt tells the brain to WORK to surface the genuine plays it overlooks
# (around three per cycle), preferring shorter holds and smaller sizes, while
# never fabricating a counter-evidence trade. These are the named tuning targets
# the per-cycle STRAT_CALL_A_ACTIVITY observability line measures against — NOT a
# quota and NOT an on/off lever. Tuning starting points.
# 2026-07-07 (win-rate enhancement Phase B): lowered 3 -> 2 alongside
# top_n_to_brain 5 -> 3. Prompt-level guidance toward fewer, better plays;
# never a quota. Rollback: 3.
brain_target_play_count = 2
brain_preferred_hold_minutes_max = 25

# Definitive-fix Phase 6 (2026-04-28): cold-start completeness gate.
# Forensic E.2.4 captured first-cycle packages at completeness=0.67
# (XRAY/regime/F&G caches still warming up) — auto-execute fired and
# placed losing trades on incomplete data. The gate fires BEFORE
# Claude is called: the cycle is short-circuited and a Telegram alert
# warns the operator. ``boot_grace_*`` is the stricter gate during
# the first ``boot_grace_period_sec`` seconds after process start.
# Layer 1 restructure Phase 7 — when true, the strategist reads
# per-coin sections from layer_manager._coin_packages instead of
# querying 12 services per cycle. Set false to fall back to the
# legacy service-query path during Phase 9 observation if a
# regression is detected.
use_packages = true
# Phase 9 cutover (2026-05-01): flipped default to true. The strategist
# surfaces the Phase 3/4 briefing fields (state_label, action_hint,
# interestingness_score, votes block) in the per-coin TRADE CANDIDATES
# block AND extends TRADE_SYSTEM_PROMPT with one new section that
# teaches Claude how to read those fields. Set false to roll back to
# the legacy prompt shape instantly.
surface_briefing_fields = true
# Brain-prompt-enrichment Phase 3.1 (2026-05-16) — number of strategy
# voters surfaced per candidate in the TRADE CANDIDATES block. Replaces
# the legacy "Top BUY" + "Top SELL" sub-blocks of 3 each with a single
# "Top-N" line ranked across all directions by confidence*weight. Set
# to 3 to mimic the prior 6-name budget; set to 0 to suppress the line
# entirely. Gated by surface_briefing_fields above.
surface_top_n_voters = 10
# Brain-prompt-enrichment Phase 3.2 (2026-05-16) — when true, emit a
# one-line opposition characterization after the Top-N voters line for
# each candidate. Tells the brain WHICH side opposes, how many strong
# opposing voters fired, and the opposing vs agreeing weighted sums.
# Tiers: NEGLIGIBLE / WEAK / MODERATE / STRONG. Set false to suppress.
emit_vote_opposition = true
# Brain-prompt-enrichment Phase 3.3 (2026-05-16) — when true, emit a
# one-line per-coin strategy-category vote split. Brain reads how
# cross-category the agreement is (more robust) vs one-category
# cluster (weaker). NEUTRAL votes excluded — only directional votes
# contribute. Set false to suppress.
emit_category_split = true
# Candidate-Block Data Integrity Fix — Issue 1 (2026-06-09) — when true,
# the CALL_A candidate block labels a genuine direction disagreement
# explicitly: an "inputs disagree" note when the intelligence Signal
# direction or the strategy-ensemble lean contradicts the X-RAY structural
# direction on the same coin, the one-sided "Votes" line relabeled as the
# confirmed-direction tally, and the Two-sided poll rendered whenever
# two-sided polling is active. Presentation only — no signal/vote value is
# recomputed; structure/regime stay authoritative for direction. Set false
# to restore the prior one-sided rendering with no code change.
emit_direction_disagreement_notes = true
# Candidate-Block Data Integrity Fix — Issue 4 (2026-06-09) — when true, the
# per-coin Components line holds the global fear_greed index out of the
# magnitude-ranked top-5 (where it always crowded the real per-coin signals)
# and appends it once tagged "(global, direction-inactive)". Presentation only;
# fear-greed remains inactive for signal direction regardless. Set false to
# restore the prior magnitude ranking.
fear_greed_components_demote_enabled = true
# Five-Fix Follow-Up — Fix 1 (components purity, 2026-06-10) — when true, the
# per-coin Components line excludes the internal classifier diagnostics
# (confidence_floor_failed, confidence_below_strong, confidence_below_buy,
# original_signal_type) so the brain sees only genuine market inputs.
# Presentation only: the diagnostics stay in the Signal.components dict for the
# database, X-RAY and tests. Set false to let future NUMERIC diagnostics back
# into the ranking; boolean values never render as numbers regardless (type
# guard, unconditional).
components_diagnostics_excluded = true
# Conditional X-RAY authority (2026-06-11) — live wrong-side evidence: the
# disagreement notes told the brain "structure/X-RAY is authoritative for
# direction" even when X-RAY itself graded the setup SKIP (HBAR score 30,
# shorted against a unanimous 26-strategy long poll at the range floor) or
# tagged it COUNTER-TRADE (HYPE conf 0.22, shorted at range_pos 0.00). When
# true, the authority clause applies only when the X-RAY read is tradeable by
# its own flags; weak reads get a WEAK-read note pointing at the ensemble
# lean and per-coin regime instead, and the same-side action hint is
# withheld. min_score mirrors the scorer SKIP cutoff (C >= 45). Set false to
# restore the prior unconditional authority framing.
xray_authority_conditional_enabled = true
xray_authority_min_score = 45.0
# Brain-Awareness Prompt Additions — Addition 2 (2026-06-09) — book-tilt
# awareness. When true, the ACCOUNT section shows the open book's long-vs-short
# composition and a compact tilt label, with a NEUTRAL consider-note when the
# book is tilted, so the brain can see when a new same-direction trade piles onto
# an already one-sided book. Awareness only — no block, no cap, no suppression.
# Set false for instant rollback. book_tilt_small_count: abs(long-short) <= this
# reads "balanced". book_tilt_one_sided_ratio: majority/minority >= this (or one
# side zero) reads "heavily <dir>-tilted"; in between reads "<dir>-leaning".
book_tilt_enabled = true
book_tilt_small_count = 2
book_tilt_one_sided_ratio = 3.0
# Four-Element Prompt Recalibration, Element 1 (2026-06-11) — the re-keyed
# quality-over-quota skip-permission thresholds, injected into both CALL_A
# system prompts. June-11 forensics: the dead-thin-zero-fired cluster (zero
# strategies fired AND dead regime AND volume ratio at or below the threshold)
# lost all 11 submissions (IMX vol_ratio 0.229, MON 0.043 — 0.25 is the
# tightest round value covering both), and every coin attempted 6 or more
# times in the session lost (DYDX 24, INJ 9, IMX 7; all winners at 5 or
# fewer). Permission language only — the brain still decides freely on every
# coin; no gate, no exclusion. quality_skip_heavy_attempts is shared with the
# Element 2 session-attempts line so prompt words and rendered fact never
# drift apart.
quality_skip_thin_vol_ratio = 0.25
quality_skip_heavy_attempts = 6
# Four-Element Prompt Recalibration, Element 2 (2026-06-11) — per-coin
# session-attempt awareness line in CALL_A ("Session today: N attempts, net X
# USD"; a heavy losing coin additionally names the quality-over-quota skip
# permission). Computed READ-ONLY from trade_log for the current UTC day in
# the ACTIVE exchange mode; a fresh coin renders nothing; the heavy threshold
# is quality_skip_heavy_attempts above. Awareness only — no gate. Set false
# for instant rollback of the line.
session_attempts_enabled = true
# Four-Element Prompt Recalibration, Element 4 (2026-06-11) — session-liveness
# line under the market context ("Session liveness: thin — 4 of 5 measured
# candidates at or below volume ratio 0.25."). June-11: 40 percent of blocks
# had vol_ratio below 0.05 and 49 of 62 loss submissions fell in the
# 04:00-10:00 UTC trough, with nothing in the prompt saying the tape was dead.
# Computed from the finalized candidate set's measured volume ratios, zero new
# I/O; context only, NOT a trading-hours restriction — the brain may take a
# genuine play at any hour. Thin share >= thin_min_thin_share reads thin;
# <= live_max_thin_share reads live; between reads mixed. Set
# session_liveness_enabled = false for instant rollback of the line.
session_liveness_enabled = true
session_liveness_thin_vol_ratio = 0.25
session_liveness_live_max_thin_share = 0.20
session_liveness_thin_min_thin_share = 0.60
# Brain-prompt-enrichment Phase 3.4 (2026-05-16) — when true, emit a
# single "TODAY DIRECTION PERF" line in CALL_B (position management)
# after the TODAY PnL line. Format: "Longs NW/ML (X% WR) | Shorts ...".
# Suppressed when zero trades have closed today on either side.
# CALL_B only — the aggressive-framing rewrite intentionally removed
# this from CALL_A to avoid recency bias on new-trade decisions.
emit_direction_perf_in_callb = true
# Brain-prompt-enrichment Phase 3.5 (2026-05-16) — when true, query
# trade_intelligence (TIAS Phase 2 ds_why + ds_what_should_done) for
# recent losses matching (symbol, side, regime) and inject one-line
# lesson context into CALL_A per-coin block under RECENT_LOSER_COOLDOWN
# flag. CALL_B intentionally excluded — the Post-Execution Closure Fix
# (2026-05-05) removed TIAS lessons from CALL_B after a closed-loop
# premature-close failure. Look-back default 336 hours (14 days).
# Max 2 lessons per coin. Set false to suppress.
emit_recent_loss_context = true
recent_loss_lookback_hours = 336
recent_loss_max_lessons = 2
# Direction-reconcile fix (2026-06-04, Problem 6 / F22) — max chars of a TIAS
# loss-lesson "Cause:" excerpt (was a hard 57-char cut that dropped the failure
# pattern mid-sentence). Clause/sentence-boundary aware so it never cuts a word.
tias_cause_max_chars = 120
# Strategic review interval (seconds) — alternating Call A (trades) / Call B (positions)
# 150s = 2.5 min between calls, giving 5 min per call type
strategic_interval = 150
# Watchdog Claude review interval (seconds) — reviews positions every 30s
watchdog_interval = 30
# Legacy settings kept for backward compatibility
analysis_interval = 900
signal_triggered = true
min_signal_confidence = 0.45
max_calls_per_hour = 30
model = "deepseek/deepseek-chat"
max_tokens = 4096
temperature = 0.3

# Claude CLI subprocess timing (Phase 2 session-stability fix — Y-22 + timeout retune)
# Hard cap on one Claude CLI invocation. Was hardcoded 300 in manager.py.
claude_cli_timeout_seconds = 300
# Retries after failure (non-retryable errors — auth, billing — still skip retry).
claude_cli_max_retries = 2
# Floor between consecutive Claude CLI invocations (adaptive interval).
claude_cli_min_interval = 2.0
# Brain-CLI model pin (2026-05-30). The trading brain's `claude -p` calls are
# latency-critical and must return terse JSON within the first-byte deadline.
# With NO model pin the CLI defaults to the heaviest tier (claude-opus-4-8[1m]),
# which takes ~240s of deep reasoning on the full 24.7K trade prompt (measured)
# and breaches the 300s deadline -> CLAUDE_PROC_KILLED / total_timeout. Pinning
# Opus 4.7 keeps Opus-tier decision quality while returning clean JSON in ~78s
# (measured), well under the deadline. This is NOT a CLI downgrade — the binary
# (2.1.x) is unchanged; only the per-call --model is pinned for the brain, so the
# operator's interactive default (Opus 4.8) is untouched. Set to "" (empty) to
# pass no --model and fall back to the CLI default (instant revert).
claude_cli_model = "claude-opus-4-7"
# P2-1 (2026-05-13) — first-byte deadline. The operator's complete pipeline
# takes ~4 min per cycle, with the Claude API alone contributing 2+ min for
# the first byte on large CALL_A prompts (today's healthy first-byte p50 is
# 123 s, p99 is 247 s). The default of 90 s in BrainSettings is too aggressive
# for this cadence — it false-positives on the majority of legitimate slow
# calls. Setting this to match claude_cli_timeout_seconds keeps the new
# CLAUDE_PROC_FIRST_BYTE_DEADLINE observability tag (which fires only when
# the call has produced ZERO stdout by the deadline, distinguishing it from
# a streaming-failed total timeout) while preventing false positives on
# healthy slow calls. Set to 0 to disable entirely.
claude_cli_first_byte_timeout_seconds = 300
# INCIDENT FIX (2026-05-31): force cold-spawn by disabling prewarm reuse.
# Root cause: after the 13:55 restart, REUSED prewarmed `claude -p` workers
# (kept alive by the H1 newline-keepalive, then parked 5-10 min) hung producing
# ZERO stdout for the full 300 s first-byte deadline, then were killed — every
# CALL_A failed (status=failed trades=0) for 75+ min. Fresh COLD-spawned workers
# (immediate prompt+EOF, no keepalive park) were verified working in 3-5 s on the
# same CLI 2.1.158 / opus-4-7 / valid creds. max_age=0 makes the pool dispose
# every prewarmed worker on acquire (age > 0 always) and fall through to the
# proven cold-spawn path (claude_code_client.py:1587-1616). Cold-spawn cost is
# ~0.6 s — negligible vs first-byte. Revert to 900 once the keepalive-park is
# fixed for the current CLI. first_byte stays 300 (legit first-byte p99=247 s).
#
# RECURRENCE FIX (2026-06-02): the CLI auto-updated 2.1.158 -> 2.1.160 and the
# keepalive-park hang came back (every CALL_A timing out, brain dead after each
# VM restart). Root cause confirmed: parked `claude -p` workers (stdin held open
# by the H1 keepalive) hang on 2.1.160 producing zero stdout; an immediate
# prompt+EOF cold-spawn works in ~3 s on the same CLI.
#
# SAFE RE-ENABLE (F28, 2026-06-05): CLI is now 2.1.165 and the hang NO LONGER
# reproduces — a parked-worker reproduction showed the parked worker responding in
# ~4 s (faster than cold). Rather than blindly re-enable (the hang recurs on each
# auto-update) the pool now gates reuse on an out-of-band CANARY: a throwaway
# worker is keepalive-parked and must answer a trivial prompt within a short
# deadline before reuse is trusted, re-confirmed every
# claude_cli_prewarm_canary_ttl_seconds. If a future CLI starts hanging parked
# workers the canary catches it OFF the hot path, the pool self-disables to
# cold-spawn, and a CALL_A is never blocked again. So max_age is restored to 900.
# NOTE: re-enabling removes only the ~50 ms cold-spawn cost; it does NOT reduce the
# 60-200 s first-token latency, which is Anthropic-API server-side, not spawn.
# first_byte stays 300 (legit first-byte p99=247 s). Set max_age=0 to fully
# disable prewarm again (canary then never runs; brain always cold-spawns).
claude_cli_prewarm_max_age_seconds = 900
# F28 (2026-06-05) — warm-pool canary re-confirmation interval (seconds). The
# canary re-verifies the current CLI serves a parked worker without hanging this
# often (and on the first calls after boot). Lower = faster detection of a CLI
# that starts hanging, at the cost of a trivial probe call more often.
claude_cli_prewarm_canary_ttl_seconds = 600
# Issue 1 (latency, 2026-06-06) — CALL_A first-token time is the model THINKING
# before it answers, NOT process spawn. Proven over 1200 live samples:
# first_token_ms correlates with prompt size at r=0.80 but with pool-hit at only
# r=0.01, and cold-spawn is ~49 ms; the warm pool is already enabled and does not
# reduce the 60-163 s wait. The brain runs `claude -p --model claude-opus-4-7`
# with NO --effort flag, so it thinks at the CLI default (high) effort. These
# flags trim that overhead. Each is independently reversible: set
# claude_cli_effort = "" to drop --effort (CLI default), or set a bool false to
# drop that flag. All-off is byte-identical to the pre-Issue-1 invocation.
#   effort: Opus 4.7 adaptive-thinking depth (low|medium|high|xhigh|max). "medium"
#           is the chosen first step down from the default; "" disables the flag.
claude_cli_effort = "medium"
#   bare: skip hook / LSP / plugin auto-discovery on spawn. KEPT OFF: on CLI
#         2.1.167 `--bare` ALSO skips OAuth credential loading, so the call fails
#         "Not logged in" (verified 2026-06-06). The plumbing stays so it can be
#         re-enabled if a future CLI makes --bare auth-safe; do not set true on
#         2.1.167.
claude_cli_bare = false
#   exclude_dynamic_system_prompt: KEPT OFF because it is a NO-OP on the brain
#         path. CLI 2.1.167 help: this flag "only applies with the default system
#         prompt (ignored ...)" — and the brain ALWAYS passes --system-prompt, so
#         the CLI ignores it entirely. It does not error, but it trims nothing
#         here. The plumbing is retained (harmless) for a future path that uses the
#         default system prompt; the ONLY active latency lever is --effort.
claude_cli_exclude_dynamic_system_prompt = false
# Backoff base for timeout-path retries: sleep = (attempt+1) * base seconds.
# 10 → ladder 10s/20s/30s. Was hardcoded 30 → 30s/60s/90s.
# Lowering halves the brain-outage window after a single timeout.
claude_cli_retry_timeout_backoff_base_seconds = 10
# Phase 3 (Brain credentials) — pre-flight refresh margin in seconds.
# Trigger an OAuth refresh if the access token expires within this window;
# if the refresh fails AND we are inside the margin, raise
# CredentialRefreshError instead of spawning a doomed subprocess.
credential_refresh_margin_seconds = 600
# Phase 3 (Brain credentials) — refresh attempt budget per call.
# 3 attempts with exponential backoff (1s/3s/7s) before giving up.
credential_refresh_max_attempts = 3
# Cap on watchdog events injected into the Call A URGENT prompt.
# Defence-in-depth — EventBuffer already truncates at 3000 chars.
prompt_event_buffer_max_events = 20

# Definitive-fix Phase 6 — cold-start completeness gate.
[brain.cold_start_protection]
enabled = true
# Issue E12 (2026-05-27): relaxed from 0.85 to 0.70. E12 makes the validator
# count failure-defaults, so honestly-scored degraded packages now lower the
# cycle average; this gate must not block the whole new-trade batch on those
# honest scores. The per-package floor + min_qualified_packages below still
# enforce "at least one truly-warm package", so cache-warmup safety holds.
# Reversible: restore 0.85. See memory/project_completeness_coldstart_interaction.md.
min_avg_completeness = 0.70
min_per_package_completeness = 0.75
# Phase 7 of the 1D briefing rewrite — lowered from 3 to 1. The gate's
# purpose is CACHE-WARMUP safety, not minimum-cohort enforcement. One
# well-formed package proves caches are warm. The completeness floors
# (min_avg_completeness, boot_grace_completeness) still detect
# cache-degradation. See dev_notes/phase7_1d_briefing/decision_record.md.
min_qualified_packages = 1
boot_grace_period_sec = 600
# Issue E12 (2026-05-27): relaxed from 0.95 to 0.80 for the same reason as
# min_avg_completeness above — honest E12 scores must not block the batch
# during boot grace. Reversible: restore 0.95.
boot_grace_completeness = 0.80

# Stage 2 (strategist -> Claude) prompt-richness knobs.
# Scanner still emits up to 15 packages (see [scanner.briefing]);
# Stage 2 keeps the top-N of those for the per-coin prompt block so
# size stays bounded as the per-coin block grows under
# enable_full_layer_block. Phased rollout: enable_* flags ship inert
# (default false) and are flipped on together at the live trial.
[stage2]
# Operator preference (2026-05-05): top candidates feed the Stage 2
# prompt; Claude selects 2-4 trades from those (see
# TRADE_SYSTEM_PROMPT_ZERO_TWO range). Wider candidate set + higher
# trade-count ceiling lets the system exploit more concurrent setups
# without losing the strict-contract structure.
# 2026-05-31: lowered 10 -> 5 to SHRINK the CALL_A prompt. The per-candidate
# TRADE CANDIDATES blocks are ~69% of the user prompt (~2.4K chars each), so
# capping the brain to the 5 best candidates cuts the prompt substantially and
# eases brain first-token latency. Open positions are shown separately and do
# NOT count against this cap. Raise back toward 10 if 5 setups is too few.
# 2026-07-07 (win-rate enhancement Phase B): lowered 5 -> 3. Fewer, higher-
# ranked candidates per CALL_A cuts trade frequency (structural fee drag was
# 0.11%/round-trip across ~340 trades/day) and raises the average candidate
# bar (top-3 by interestingness vs top-5). Also further shrinks the prompt.
# Rollback: raise back to 5.
top_n_to_brain = 3
# Stage 2 phase 5 live trial (2026-05-05) — 3 flags flipped ON together.
# Activates: rich Layer 1B/1C per-coin block (Phase 2),
#            strict bounded-count trade contract (Phase 3 — currently
#            2-4 range; setting name retained for backward-compat,
#            see TRADE_SYSTEM_PROMPT_ZERO_TWO docstring),
#            section-priority trim that protects essentials (Phase 4).
# Rollback: set any/all back to false; restart trading-workers.
# Flag-flip only — no code revert needed.
enable_full_layer_block = true
enable_zero_two_contract = true
enable_priority_trim = true
# Per-coin-authority Phase 6 (2026-05-29): cutover + ROLLBACK for removing the
# global-regime DIRECTION lead from the brain prompt. true = per-coin is the
# direction policy (no global "use as default bias" mandate; each coin trades
# its OWN regime; only the breadth SIZING brake survives market-wide). Flip to
# false to instantly restore the old global short/long-bias NOTE if a trial
# shows the long side bleeding once the global short-bias is removed.
per_coin_direction_enabled = true
# Sniper-Latency-Size Fix Phase 2 (2026-05-07) — gated rollout of
# per-coin verbosity compression in the full-layer formatter. Tighter
# separators (single space instead of ", ") on the Components and
# Active categories lines, plus one-decimal-lower precision on the
# per-coin Components numeric fields. Identity-preserving (no field
# removed; no abbreviation key needed) so flipping False -> True is
# reversible. Realistic saving on a 10-coin top-N CALL_A is ~150-300
# chars (~1-2 % of a 15K prompt). The compression rides on top of
# enable_full_layer_block — when the full-layer formatter is dormant
# the flag has no effect. The bigger architectural win (Anthropic
# prompt caching) is documented as deferred in
# dev_notes/sniper_latency_size_fix/phase2d_caching_finding.md.
enable_prompt_compression = false
# Candidate-Block Data Integrity Fix — Issue 3 (2026-06-09) — decimal places for
# the per-coin "Components:" line. Default 4 (was a hardcoded 3, which rounded a
# real funding rate like -0.0002 to -0.000). Matches the "Funding:" line so a
# genuine small value is visible rather than looking dead.
component_precision_decimals = 4

[risk]
# ===================== RISK MANAGEMENT — AGGRESSIVE (PAPER ONLY) =====================
max_leverage = 5
mandatory_stop_loss = true
default_stop_loss_pct = 3.0
default_take_profit_pct = 6.0
# F37 (2026-06-05) — downstream minimum stop-loss distance (percent of entry).
# SLTPValidator.validate_sl clamps any brain-proposed stop closer than this (or
# at/through entry) out to this distance before execution. Matches the CALL_A
# prompt rule "SL at least 1.5% from entry". Safety net on the ENTRY stop only;
# the exit systems (trailing/ladder/chandelier) are untouched.
min_sl_distance_pct = 1.5
max_position_size_pct = 20.0
max_open_positions = 10
daily_loss_limit_pct = 10.0
max_total_exposure_pct = 80.0
max_drawdown_pct = 25.0
min_order_value_usdt = 5.0
loss_cooldown_seconds = 30
# Maker-entry experiment (win-rate enhancement Phase D, 2026-07-07).
# "market" (current default) = taker entry as today. "limit" = passive GTC
# limit at current price (offset entry_limit_offset_bps toward the passive
# side), waited up to entry_limit_timeout_seconds then CANCELLED + SKIPPED
# if unfilled (no chase). Cuts entry fee 0.055% taker -> ~0.02% maker
# (round trip 0.11% -> ~0.075%, meaningful vs the +/-0.40% avg trade).
# SHIPS INERT ("market"); flip to "limit" only AFTER the entry-quality
# filters' effect is measured, so the two changes stay attributable.
entry_order_type = "market"
entry_limit_timeout_seconds = 20.0
entry_limit_offset_bps = 0.0
# Direction-flip threshold for the XRAY direction recheck in
# strategy_worker._execute_claude_trade. ratio = rr_opposite / rr_chosen.
# When ratio > threshold AND structural SL/TP for the opposite direction
# is available, the trade flips to the better-R:R direction and re-runs
# the X-RAY conflict check. Replaces the prior block-at-5x / reduce-at-3x
# behavior (Phase 1 of dir-block-fix, 2026-05-05).
xray_dir_flip_threshold_ratio = 3.0

# X-RAY Direction-Flip Switch (IMPLEMENT_XRAY_FLIP_SWITCH, 2026-05-25).
# Master on/off for X-RAY's ability to REVERSE trade direction in the
# execution path (strategy_worker._execute_claude_trade). false = the
# sanctioned brain-then-APEX direction executes, flip disabled (operator
# default, set to begin measuring the flip-off effect); true = pre-switch
# behavior (X-RAY may reverse direction on extreme structural-RR ratios).
# Does NOT affect X-RAY scoring / grading / selection, the structural
# blocks, or the high-conviction veto (xray_high_conviction_protection_
# enabled). Boot sentinel XRAY_FLIP_SWITCH_SENTINEL reports the state.
xray_dir_flip_enabled = false

# P0-2 fix (2026-05-22) — high-conviction protection.
# When the brain's directive is high-conviction (per-coin regime is
# trending_up + Buy, or trending_down + Sell, AND structural_data
# .trade_direction agrees), XRAY is allowed to VETO (skip the trade
# with a single-reason DIRECTION_DECISION log) but is NEVER allowed
# to silently reverse the direction. Default true. Set false to
# revert to pre-P0-2 behavior (XRAY can flip any direction when
# structural-rr ratio is extreme).
xray_high_conviction_protection_enabled = true

# X-RAY Trade-Suppression Switch (IMPLEMENT_XRAY_SUPPRESS_SWITCH, 2026-05-25).
# Master on/off for X-RAY's ability to SUPPRESS (block/skip) a trade the brain
# and APEX already decided, in strategy_worker._execute_claude_trade. false =
# X-RAY blocks NOTHING — every would-be block (xray_skip, xray_conflict,
# xray_veto_high_conviction, xray_dir_block, xray_dir_flip_blocked) is written
# to the booklog as an XRAY_BOOKLOG line and the brain's direction executes
# (operator default 2026-05-25; the trades X-RAY used to skip now run). true =
# pre-switch behavior (X-RAY blocks). Does NOT affect X-RAY scoring / grading /
# selection / structural analysis or its analysis logs — X-RAY keeps running
# and journaling either way. Orthogonal to xray_dir_flip_enabled (which gates
# REVERSAL). Boot sentinel XRAY_SUPPRESS_SWITCH_SENTINEL reports the state.
xray_trade_suppression_enabled = false

[risk.flip_tp]
# Cap parameters for the XRAY-direction-flip TP derivation
# (TP-Volume-Closure fix Phase 1B, 2026-05-07). Used by
# `src/core/flip_tp_capper.py` to bound the structural TP that the flip
# path attaches to a flipped trade. Without this cap, the structural
# target can sit 15-20% from current price for thinly-supported coins
# and the SL/TP validator (10% ceiling) rejects the trade entirely.
#
# Cap formula:
#   if vol_profile available:
#     vol_cap_pct = min(vol_profile.recommended_tp_pct *
#                       structural_buffer_multiplier,
#                       hard_ceiling_pct)
#   else:
#     vol_cap_pct = fallback_tp_distance_pct
#   final_dist_pct = min(structural_dist_pct, vol_cap_pct)
#
# enabled: master switch; set false to revert to pre-fix behavior.
# hard_ceiling_pct: absolute cap regardless of volatility class. 5% is
#   the upper bound for 10-30 minute holds; anything higher belongs to
#   swing-trading timeframes. The downstream validator's own ceiling is
#   10%, so this is the tighter of the two safety nets.
# fallback_tp_distance_pct: used when VolatilityProfiler returns no
#   profile (e.g., new symbol, profiler degraded). Conservative 2%.
# structural_buffer_multiplier: multiplied against vol_profile's
#   recommended_tp_pct before the min(). Default 1.0 means strict cap
#   (matches spec literally). Raise to 1.25 / 1.5 in trial to allow
#   structural targets to extend modestly beyond vol-aware. The
#   volatility profile already includes regime multipliers (1.3x for
#   trending, 0.7x for ranging) so vol_aware is itself context-aware;
#   this multiplier sits ON TOP of that.
enabled = true
hard_ceiling_pct = 5.0
fallback_tp_distance_pct = 2.0
structural_buffer_multiplier = 1.0

# Fix 7 (volatility-scaled entry stop, 2026-06-10) — the constant ~1.5% minimum
# stop sat INSIDE volatile coins' normal noise band (91% of closes were stop-hits
# in the choppy losing window vs 44-72% in trend), so ordinary breathing ended
# trades before their thesis could play out. When enabled, the entry stop is
# WIDENED to the coin's volatility-recommended distance (the volatility profiler's
# recommended_sl_pct, which already encodes class + regime — e.g. a high/extreme
# coin gets 2.4-3.6%), floored at reference_stop_pct (quiet coins keep the 1.5%
# minimum-distance; the stop is never tightened below it) and capped at
# max_cap_pct. The wider stop is paired with a proportionally SMALLER position so
# the dollar risk AT the stop stays within the same reference budget (the live
# path sizes by margin x leverage, not by stop distance, so the haircut is
# explicit and tighten-only). The sacred per-trade margin cap is untouched.
# Shipped OFF 2026-06-10; ENABLED 2026-06-10 evening (Five-Fix Follow-Up
# Fix 3) after the losing-window replay passed: 50 real stop-hit trades
# replayed through the live helper (verify_fix3_losing_window_stop_replay.py),
# 4 of 7 noise-deaths survive their first 30 minutes (57%, RUNE x3 + KAT),
# zero dollar-budget violations. The Call-A prompt now shows each candidate a
# "Vol stop floor" line mirroring this exact clamp. Set false for instant
# rollback (also removes the prompt line).
[risk.volatility_stop_scaling]
enabled = true
reference_stop_pct = 1.5
max_cap_pct = 5.0
use_profiler_recommended_sl = true
recommended_sl_scalar = 1.0

[alerts]
# Enable Telegram alert notifications
telegram_enabled = true
# Alert levels to send: INFO, WARNING, CRITICAL
alert_levels = ["WARNING", "CRITICAL"]
# Send daily performance summary
daily_summary = true
# Daily summary time (UTC, HH:MM format)
daily_summary_time = "00:00"
# Rate limit alerts: max messages per minute
max_alerts_per_minute = 10
# Include trade entry/exit alerts
trade_alerts = true
# Include signal alerts
signal_alerts = true
# Include error alerts
error_alerts = true

[mcp]
# MCP transport: "stdio" for Claude Code, "sse" for browser/claude.ai
transport = "stdio"
# SSE server host (only used when transport = "sse")
sse_host = "0.0.0.0"
# SSE server port
sse_port = 8080
# Authentication required for SSE transport
sse_auth_required = true
# Server name advertised via MCP
server_name = "trading-intelligence"
# Server version
server_version = "0.1.0"

[watchdog]
# Position Watchdog: code rules every 10s (timer, trailing, hard stops, duplicates)
# Claude reviews handled by LayerManager every 30s
enabled = true
# How often to check positions (seconds) — code rules
check_interval_seconds = 10
# Alert when position loses > X% from entry
loss_warning_pct = 0.5
# Alert when position drops > X% from its peak unrealized profit
trailing_loss_pct = 0.3
# Alert when price is within X% of the distance to stop-loss
sl_proximity_pct = 30.0
# Alert when price moves > X% against position in single check
rapid_move_pct = 0.5
# Trigger Claude Brain when position loses > X%
brain_trigger_loss_pct = 0.8
brain_cooldown_seconds = 60
partial_close_pct = 50.0
max_brain_calls_per_hour = 20
# Layer 3: early-exit disabled (0% historical win rate, 24/24 losses).
# SL handles exits cleanly. Set true to re-enable; monitoring log
# 'EARLY_EXIT_DISABLED_WOULD_FIRE' shows what it would have done.
early_exit_enabled = false
# Phase 2 (P0-1 Ghost Positions): fast set-diff reconcile cadence —
# independent of the 5-min thesis sweep. 0.0 disables (kill switch).
fast_reconcile_seconds = 30.0
# Post-Execution Closure Fix Phase 1B (2026-05-05) — strategic-action
# minimum-hold guardrail. Refuses CALL_B close/take_profit actions on
# positions younger than this threshold UNLESS the close reason matches
# a substring in the allow-list below (case-insensitive). Hold/tighten
# /set_exit are unaffected. Defense-in-depth against recency-bias
# closure language sneaking back into the position-management prompt.
strategic_action_min_hold_seconds = 300.0
strategic_action_allowed_early_close_reasons = [
    "stop loss hit", "sl hit",
    "take profit hit", "tp hit",
    "structure invalidated", "setup broken",
    "regime change", "regime shift",
    "manual operator close", "manual close",
]

# Issue 1 (2026-05-18 ship 2026-05-20) — brain-close multi-factor scoring.
# The watchdog intercepts brain's `wd_claude_action` close votes and runs
# a 7-factor composite score (PnL, time remaining, age, velocity, SL
# consumption, XRAY agreement, reasoning quality) before executing.
#
# wd_brain_scoring_enabled (kill switch) — when False the entire scoring
#   path is bypassed and brain's close fires immediately. Default True.
# wd_brain_scoring_enforce — Phase 1 (False, log-only): scoring computes
#   and emits WATCHDOG_CLOSE_SCORE_COMPUTED + WD_CLOSE_SCORE_LOG_ONLY but
#   brain's close still fires. Phase 2 (True, enforce): composite < 0
#   tightens SL 30% toward breakeven instead of closing; 0 <= composite
#   < threshold holds the position; composite >= threshold executes.
#   Operator flips to True after ~24-48h of log-only data review.
# wd_brain_scoring_threshold — composite gate for "execute" in enforce
#   mode. Default 6.0 matches the scoring module's DEFAULT_THRESHOLD
#   and the IMPLEMENT_THREE_ISSUES_FIX.md worked examples.
wd_brain_scoring_enabled = true
wd_brain_scoring_enforce = true
wd_brain_scoring_threshold = 6.0

# P0-3 fix (2026-05-22) — hard_risk_floor SL consumption percent.
# When the current SL consumption is at or above this value, the
# brain's close vote force-closes regardless of the composite score.
# Catches edge cases where the composite is below threshold but the
# position is already burning through its risk budget. Default 85.0
# (operator-approved at the P0-3 gate). Set to 100.0+ to disable.
wd_hard_risk_floor_sl_pct = 85.0

# Layer 4 Realignment Phase 3.2 (2026-05-06) — configurable thresholds
# for the watchdog's system-initiated emergency-mode triggers. Pre-fix,
# the watchdog hardcoded session_pnl < -5.0 and hard_stops_this_hour >= 3
# in `_determine_mode`; both now configurable. The hard-stops threshold
# is raised from 3 to 5 to absorb noisy hours where normal-loss trades
# happen to cluster, reducing false-positive emergencies and giving the
# regular loss-management paths (CALL_B, time-decay, sniper) more room
# to act before the nuclear option triggers. The session_pnl threshold
# stays at -5.0 (pre-fix value) — that one IS a genuine session
# circuit-breaker.
[watchdog.emergency]
session_pnl_threshold_pct = -5.0          # session circuit-breaker (negative %)
hard_stops_per_hour_threshold = 5         # raised from 3; reduces false-positive emergencies

[mcp_pool]
# Phase 23 (Y-22) — MCP client pool. Disabled by default; turn on per
# consumer to migrate off the one-shot stdio storm. Each consumer that
# imports MCP tools should:
#   1. Set ``enabled = true`` here.
#   2. Run ``python server.py --transport sse`` in the background
#      (workers manager can host this — add to manager.py if needed).
#   3. Acquire a client via ``MCPClientPool.acquire`` instead of
#      shelling out to ``server.py`` per call.
# When enabled=false, every consumer keeps using one-shot stdio.
enabled = false
sse_url = "http://127.0.0.1:8080"
min_warm = 1
max_warm = 2
health_check_interval_seconds = 60
acquire_timeout_seconds = 2.0

[price]
# Local-price freshness + divergence-observation tuning. After the
# price-source-divergence fix (2026-05-03) the Transformer's enrichment
# is observation-only — Shadow's authoritative mark_price and
# unrealized_pnl_usd pass through to the dashboard unchanged. The
# divergence math is still run because the strategist's
# PROMPT_DEFERRED gate consumes ``_last_enrichment_max_divergence_pct``.
#
# - local_max_age_seconds: above this age the WebSocket-fed local price
#   is treated as stale and the divergence calc is skipped for that
#   position (PRICE_STALE WARNING logged). Set to a large number (e.g.
#   999999) to disable the staleness gate.
# - divergence_override_pct: above this absolute divergence
#   (% of Shadow's price) the observation emits a PRICE_DIVERGENCE_OBS
#   WARNING + MED-priority price_divergence_obs event-buffer entry so
#   operators / Claude see the drift. The name is retained for backward
#   compatibility with config.toml; semantics changed from
#   "above-threshold = keep Shadow / below-threshold = override to
#   local" (pre-fix) to "above-threshold = log + event-buffer /
#   below-threshold = silent observation" (post-fix). No mutation
#   happens in either branch. Set to a large number (e.g. 999) to
#   silence observation logs without affecting the strategist gate.
# - divergence_block_prompt_pct: any open position with divergence >
#   this value blocks Claude's prompt build (PROMPT_DEFERRED). The
#   strategist re-tries on the next cycle. This contract is preserved
#   byte-for-byte by Phase 2 of the price-source-divergence fix.
local_max_age_seconds = 10.0
divergence_override_pct = 0.5
divergence_block_prompt_pct = 1.0
# Issue 2.10 (2026-06-07): reject an anomalous WS tick whose price jumps more
# than this fraction (0.15 = 15%) from the last accepted price, so a bad print
# cannot corrupt a PnL/stop decision. A sustained move (consecutive ticks at the
# new level) is accepted as the new baseline, so genuine fast moves are not
# stuck-rejected. Set to 0 to disable. Observability: PRICE_SPIKE_REJECT.
spike_reject_pct = 0.15

[sl_gateway]
# Single-entry-point stop-loss gateway (Layer 3 hardening).
# When enabled, every SL modification (Time-Decay, SENTINEL, Profit Sniper
# trail, watchdog trail, brain tighten) routes through one validator that
# enforces tighten-only + min-distance + max-step + rate-limit.
#
# Rollout protocol:
#   1. Start with enabled=false (symmetric pass-through, state tracked).
#   2. Verify SL_GATEWAY_PASSTHROUGH count equals SL_PROPAGATED count.
#   3. Flip enabled=true with log_only_global=true to observe rejects.
#   4. Flip log_only flags to false one at a time for staged enforcement.
# Dry-run enabled by the Prefetch-Performance Fix (2026-04-23): every rule
# is now evaluated but REJECTs are downgraded to SL_GATEWAY_REJECT_WOULD
# logs. No trades are blocked. Once SL_GATEWAY_STATS by_rsn distribution is
# validated over a session, set log_only_global=false for hard enforcement.
enabled = true
# Rule R2: minimum distance between new SL and current price (percent).
# Legacy static fallback; when the volatility profiler is wired (default
# since manager.py), R2 uses an ATR-scaled effective min — see the
# min_distance_atr_multiplier / _abs_floor_pct keys below.
min_distance_pct = 0.3
# Rule R3: maximum step size per single SL update (percent of previous SL).
# Phase 2 of dir-block-fix (2026-05-05): lowered 0.5 → 0.25 so each
# SL tighten only moves a quarter of the remaining distance, letting
# profits run instead of locking in tight gains and giving back peaks.
# Pre-fix BSBUSDT 2026-05-05 18:02:04 single 4.519 % activation step
# illustrated the prior cap was both too generous and not enforced.
max_step_pct = 0.25
# Rule R4: minimum seconds between SL updates per symbol.
rate_limit_seconds = 30
# Fast-move placeability A/B lever (default off/inert; 30 == rate_limit_seconds).
# The profit-lock lane may re-tighten faster than rate_limit_seconds so a
# sustained big-mover peak is tracked at finer cadence. Clamped to <= the base
# window; tighten-only + fresh-mark degrade + wrong-side guard unchanged, so a
# faster cadence only ratchets the stop up toward a placeable value. Set lower
# (e.g. 10) to A/B against placement_forensic.log. Do not go below the 5s tick.
profit_lock_rate_limit_seconds = 30
# Global log-only: every rule becomes a SL_GATEWAY_REJECT_WOULD log.
# Phase 2 of dir-block-fix (2026-05-05) — Discovery 1: advance from
# step 3 → step 4 of the rollout protocol. Pre-fix runtime was in pure
# audit mode, so all R2/R3/R4 violations logged REJECT_WOULD without
# enforcement, allowing the 4.519 % BSBUSDT activation step through.
# Per-rule log_only flags below remain false so all four rules now
# enforce hard.
log_only_global = false
# Per-rule log-only flags (surgical rollout controls).
# Tighten-only MUST stay false — it is safety-critical.
log_only_tighten_only = false
log_only_min_distance = false
log_only_max_step = false
log_only_rate_limit = false

# ATR-scaled R2 min_distance (user spec: max(0.05%, atr_5m_pct * 0.5)).
# Aggressive to maximise accepted trail pushes on low-vol coins. The
# absolute floor prevents bid-ask strangulation. Class ceiling clamps
# freak spikes. See src/analysis/vol_scale.py.
min_distance_atr_multiplier = 0.5
min_distance_abs_floor_pct = 0.05

# PF/LC Top-15 Problem 1.1 — give R2 the breakeven carve-out R3 already has.
# When the ladder's armed breakeven floor is being placed, R2 clamps the stop
# toward price but never below breakeven (the entry price), so on a high-vol
# coin the floor holds AT breakeven (worst case a zero-loss exit) instead of
# being rewritten below it. Set false to revert to the unconditional R2 clamp.
r2_breakeven_floor_enabled = true

# Dynamic Adaptive Exit (2026-06-15) — R2 profit-lock-floor exemption. When
# true, an armed R-derived, fee-floored profit lock from a trusted profit
# source (ladder/trail/lock) is HELD at its value inside the min-distance
# instead of being dropped as a clamp-noop (the proven 99.6%-of-rejects
# failure). Holds the lock, not just breakeven, so it improves on the current
# stop and writes. Tighten-only, wrong-side, max-step, rate-limit, and the
# catastrophic cap are never weakened. Off by default; enabled with the
# rescaling (Commit 2) after replay verification.
r2_profit_lock_floor_enabled = true

# Dynamic Adaptive Exit FIX (2026-06-15) — fresh-mark placeability degrade. The
# R2 placeability math judges against the caller's current_price snapshot, which
# the ~150 ms wire latency can stale; on a fast retrace a value placeable against
# the snapshot is wrong-side of the live mark, the exchange blocks it, and NOTHING
# is placed (the green trade rides its old wide stop back to a loss — confirmed
# live on PYTHUSDT/MONUSDT/EGLDUSDT). When true, the gateway re-validates a
# near-the-money final stop against the freshest mark (the same field the adapter
# enforces) and DEGRADES it to the closest placeable stop — floored at breakeven
# for a trusted source — instead of emitting the unplaceable value. Tighten-only
# re-checked; never loosens; no-ops (keeps the existing stop) when even the fresh
# boundary cannot improve. log_only variant observes the would-degrade only.
r2_fresh_mark_degrade_enabled = true
log_only_fresh_mark_degrade = false
# The fresh-mark recheck only fires for near-the-money stops; a stop farther than
# this multiple of the effective min-distance cannot realistically flip wrong-side
# in the ~150 ms wire latency, so the recheck (and its extra get_position call) is
# skipped — real winners and far loss stops never pay the cost.
fresh_mark_recheck_distance_mult = 2.0

# ── Phase 1: trade-state owner switch (exit-authority consolidation) ──
# Gives the stop one owner at a time, decided by the trade's state. The gateway
# classifies every writer into a bucket and, given the trade's green/red state,
# admits only the rightful owner plus the Head (the catastrophic cap); the
# sniper spine filters its loss candidates off green trades to match.
#
# Rollout (mirrors the gateway's own enabled/log_only protocol above):
#   1. owner_switch_enabled=true, owner_switch_enforce=false — LOG-ONLY. The
#      gate computes state/owner and logs SL_GATEWAY_OWNER_HANDOFF and
#      SL_GATEWAY_WRONG_OWNER_WOULD but blocks nothing and changes no behavior.
#      Verify the hand-offs occur at breakeven on live trades.
#   2. owner_switch_enforce=true — ENFORCE. Non-owner engine writes are deferred
#      and the spine filters loss candidates off green trades (Layer B).
#   3. advisory_enforce=true — Phase 5: advisory writers (brain/sentinel/
#      watchdog-scoring/watchdog-trails) are deferred too.
# The gate fails OPEN on any internal error (admits the write) so it can never
# block a protective stop. R1 tighten-only is always enforced beneath it.
owner_switch_enabled = true
owner_switch_enforce = true
advisory_enforce = false
# Faded-winner hand-off (decided at the Phase-1 gate). false = a once-green
# ('graduated', peak >= ladder arm) trade that craters stays green-owned (the
# gateway keeps the profit engine in charge); today's behavior. Note: on such a
# graduated trade the sniper's loss block is gated by the graduation latch, so
# the per-trade CAP SL does NOT regenerate — the live catastrophe protection is
# the always-on volatility-spike force-close plus the resting exchange stop, not
# a fresh loss_cap write. true = re-arm the loss engine when the faded winner
# crosses below breakeven (Rule 5). MUST be flipped together with [loss_cutting]
# graduation_crater_rearm_enabled so the red owner actually has its tools;
# otherwise the boot sentinel SL_GATEWAY_OWNER_SWITCH_INCONSISTENT fires and the
# red owner would own the stop with nothing to write.
faded_winner_rearm_red = false
# Hysteresis band around entry. State flips to green at >= +deadband and to red
# at <= -deadband; inside the band the last owner is held (a brand-new position
# defaults to the red owner so the opening floor is the baseline).
breakeven_deadband_pct = 0.05
# Phase 2 — the Head as sole override (Option A, profit-priority). When true, a
# running GREEN trade is touched only by the Head (the catastrophic cap) or its
# own green owner; the loss engine and the advisory systems are deferred on a
# green trade so a winner can run. The Head only ever tightens (R1 guarantees
# it never loosens). The Head's force-close twins (loss_spike_force,
# loss_cap_force) close the position directly and are always-on, outside this
# gate.
head_only_seizes_green = true
# Bucket memberships (centralized, Rule 9). HEAD = always-allowed catastrophic
# cap. ALWAYS = opening stop + naked-position safety sweeper (never blocked).
# Reserved/not-yet-emitted sources are kept so a future writer is classified the
# moment it ships: "profit_sniper_breakeven" and "micro_floor" (green) and
# "sentinel_breakeven" (advisory) are not produced as gateway write sources
# today (micro_floor's writes go through profit_sniper_ladder); classifying them
# is a harmless no-op, not an active writer.
head_sources = ["loss_cap", "loss_cap_emergency"]
green_sources = ["profit_sniper_ladder", "profit_sniper_trail", "profit_sniper_lock", "profit_sniper_breakeven", "micro_floor"]
red_sources = ["time_decay", "loss_structure", "loss_recovery"]
advisory_sources = ["brain_tighten", "watchdog_tighten", "wd_brain_scoring", "sentinel_advisor", "sentinel_deadline", "sentinel_breakeven", "watchdog_lock_peak", "watchdog_breakeven", "trail_activation", "trail_update"]
always_allowed_sources = ["loss_atr_initial", "safety_sweeper"]

# Per-class ceiling for the ATR-scaled min_distance. Anything above these
# values would be an SL that's pathologically far from price (e.g. flash
# crash). Dead coins cap at 0.30% (their baseline noise); extreme coins
# can go up to 3.50% during real volatility.
[sl_gateway.min_distance_class_ceiling]
dead = 0.30
low = 0.50
medium = 1.00
high = 2.00
extreme = 3.50

# =============================================================================
# Scanner — Layer 1D selector + briefing builder
# =============================================================================
# Phase 5 of the 1D briefing rewrite introduces a mode flag that
# switches between the legacy 5-criterion exclusion gate (production
# default; preserved verbatim for instant rollback) and the new
# briefing-mode pipeline (characterize -> label -> rank -> top-N).
# Phase 9 flips the default to "briefing" after the Phase 8 A/B
# harness confirms behavior is healthy.
[scanner]
# Phase 9 cutover (2026-05-01): flipped default to "briefing". Set back
# to "exclusion" to roll back to the legacy 5-criterion gate instantly.
mode = "briefing"
# Phase 8 of the 1D briefing rewrite — A/B comparison harness.
# "off"         = mode flag governs every cycle.
# "alternating" = even-indexed cycle uses exclusion, odd-indexed uses
#                 briefing. Operator runs for 24-48h to compare per-mode
#                 metrics (package count, trade count, P&L). Result drives
#                 Phase 9 cutover decision. Restored to "off" at Phase 9.
ab_mode = "off"

# Market scanner — AGGRESSIVE TESTNET MODE
enabled = true
scan_interval_seconds = 300
min_volume_24h = 5000000
max_coins = 30
max_spread_pct = 0.15
# Phase 5 (Universe flapping fix) — re-entry cooldown bumped from the
# legacy hardcoded 300 s. A coin removed from the active universe
# cannot re-enter for this many seconds (force-included coins bypass).
reentry_cooldown_seconds = 600

# Phase 5 (Universe flapping fix) — consecutive-scan hysteresis on the
# active_universe membership decision. Without it, a coin oscillating
# around the cutoff score enters/exits every scan, triggering
# KLINE_BACKFILL → cold start → STRAT_SKIP_STALE storms (live obs:
# 14 rotations/hour on 2026-04-26).
[scanner.hysteresis]
enabled = true
entry_consecutive_scans = 2
exit_consecutive_scans = 3
entry_threshold_above_min = 5
exit_threshold_below_min = -5

# ─────────────────────────────────────────────────────────────────────
# Composite opportunity scoring (Phase 6 — corrected Layer 1).
#
# ScannerWorker reads warm caches from the 7 data workers and computes
# a per-coin opportunity score as a weighted sum of these 5 components.
# Tunable: re-balance based on observed trade outcomes.
#
# Reference: LAYER1_CORRECTED_ARCHITECTURE_BLUEPRINT.md §9.3.
# ─────────────────────────────────────────────────────────────────────
# Definitive-fix Phase 4 (2026-04-28): added ``rr`` weight so RR is both
# a (relaxed) gate AND a ranking signal. Coins with marginal RR (just
# above ``min_rr_ratio``) still qualify but rank below coins with strong
# RR. Sum stays 1.0; old weights reduced proportionally to make room.
[scanner.scoring_weights]
structure = 0.27   # X-RAY setup score (0-100, normalized)
strategy = 0.27    # StrategyWorker L2 total_score (normalized to 0-1)
signal = 0.13      # SignalWorker confidence (0-1)
regime = 0.13      # Regime alignment factor (-1..+1)
funding = 0.10     # Funding rate strength (|rate| > 0.01% counts)
rr = 0.10          # Direction-aware RR (rr_long for long, rr_short for short), normalized at RR=3.0

# Layer 1 restructure Phase 5 — qualitative checklist applied BEFORE
# the quantitative ranking step. All five criteria must pass for a
# coin to be considered for selection (force-included open-position
# coins skip this gate per HR-2). See ScannerQualitativeSettings.
#
# Definitive-fix Phase 4 (2026-04-28): min_rr_ratio 2.0 → 1.3. Forensic
# E.1.6 showed surviving setups had RR in 0.7-1.7 range — 2.0 was the
# terminal gate killing every candidate. 1.3 means winners must be 30%
# larger than losers; combined with >50% win rate and now-active RR
# composite weight, marginal-RR coins survive but only rank highly when
# their RR is genuinely strong.
[scanner.qualitative]
# Tuned 2026-04-29 (live observation): 1.3 was the dominant cut — 14 of
# 16 consensus-passers failed RR per cycle, leaving qualified=2-3 vs
# blueprint §10.2 target band of 5-25. Lowered to 1.1 to lift qualified
# count toward target, without crossing the 1.0 breakeven floor (1:1
# reward-to-risk). Quality preserved: still requires reward strictly
# greater than risk on the consensus direction; only setups with
# negative expectancy get rejected.
min_rr_ratio = 1.1
min_consensus = "GOOD"            # STRONG | GOOD; LEAN/WEAK/CONFLICT always fail
require_regime_alignment = true
funding_blocker_threshold_pct = 0.001  # 0.1% — funding above this against direction blocks
recent_failure_blocker_hours = 1
max_selection = 15
min_selection = 0                  # output empty when nothing qualifies

# =============================================================================
# 1D briefing-pack rewrite (Phase 4) — interestingness ranker config
# =============================================================================
# The briefing pipeline (state_labeler → interestingness ranker →
# briefing_builder) replaces the 5-criterion exclusion gate above with
# a graded preference: every coin gets a continuous score and the
# top-N go into the brain prompt. Phase 5 introduces the mode flag
# that flips Layer 1D from exclusion-mode to briefing-mode; this
# section's settings are read today only by the per-package score
# computation inside _build_package (additive — no behavior change).
[scanner.briefing]
top_n_packages = 15            # max coins per cycle (forced positions on top)
min_briefing_packages = 12     # soft floor — pad to this many briefings
qualified_threshold = 0.30     # interestingness floor for "qualified" flag
prompt_floor_interestingness = 0.20  # below this AND no labels → skip block

# Component weights for the interestingness formula. Must sum to 1.0
# (validated in __post_init__). Calibration: typical mid-cap with one
# label scores ~0.45; clean trend with sweep label ~0.81; weak unlabeled
# ~0.13. Top-15 cut lands around interestingness >= 0.45 in current
# market.
[scanner.briefing.interestingness_weights]
cleanness = 0.20            # regime conf + setup conf + direction agreement
confluence = 0.20           # how many directional anchors point same way
extremity = 0.15            # max(funding, F&G, range pos, OI delta, vol surge)
label_strength = 0.20       # primary label base weight + decayed secondaries
structural_quality = 0.15   # 0.45·setup_norm + 0.35·rr_norm + 0.20·mtf_score
mtf_alignment = 0.07        # MTF aligned_count / 4
open_position_floor = 0.03  # +0.03 absolute bump for held positions

# =============================================================================
# Scanner state-labeller — Issue 3 of 2026-05-19 direction-bias fix Phase B
# =============================================================================
# The 8 per-trigger regime hard-kill predicates in
# src/workers/scanner/state_labeler.py (lines 253, 268, 283, 301, 356, 371,
# 477, 491) historically returned None when the current market regime did
# not match the trigger's expected regime. After the Issue 3 fix the
# predicates compute base confidence and multiply by counter_regime_-
# confidence_haircut when the regime mismatches.
#
# 0.0 → reproduces the legacy hard-kill (label suppressed entirely).
# 0.5 → default; labels fire at half their normal confidence in mismatched
#       regime, allowing the brain to see counter-regime opportunities at
#       reduced conviction while preserving directional discipline.
# 1.0 → removes the regime gate entirely; labels fire at full confidence
#       regardless of regime.
#
# Reversible by editing this value and restarting workers. Operator may
# step from 0.5 → 0.3 (more conservative) or 0.5 → 0.7 (more permissive)
# based on Phase B trial outcome.
[scanner.labeller]
counter_regime_confidence_haircut = 0.5
# Phase 1 calibration (2026-06-08) — make the extreme-sentiment contrarian
# label per-coin instead of a uniform F&G-only confidence. Scale its
# confidence by the coin's own structural conviction (floored below so a
# structure-blind coin keeps a small score and loses primary to a real
# structural label), and haircut it in off-trend / dead / balanced regimes.
# Set conviction_floor = 1.0 and offtrend_haircut = false to revert.
extreme_sentiment_conviction_floor = 0.35
extreme_sentiment_offtrend_haircut = true
# Four-Element Prompt Recalibration, Element 3 (2026-06-11) — when true, the
# labeller receives the structure engine's pre-clamp range truth and the
# range-fade / funding-fade labels cannot fire against a genuine break:
# RANGE_FADE_LONG never fires on a price BELOW the range (a breakdown is not a
# floor — June-11 DYDX wore that label through a 24-submission breakdown),
# mirrored for shorts above the range. In-range labelling is byte-identical
# either way. Set false to restore the legacy labels without touching the
# prompt markers.
range_fade_breakout_guard_enabled = true

